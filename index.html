<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="統計刷題">
<meta name="theme-color" content="#ffffff">
<title>統計學刷題</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", sans-serif;
    background: #f5f5f0;
    color: #1f1f1d;
    line-height: 1.6;
    font-size: 15px;
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 22px; font-weight: 600; margin: 8px 0 16px; }
  h2 { font-size: 17px; font-weight: 600; margin: 20px 0 10px; color: #555; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #e8e6df;
  }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-num { font-size: 24px; font-weight: 600; color: #1f1f1d; }
  .search-wrap { margin-bottom: 16px; }
  .search-input {
    width: 100%;
    padding: 11px 14px;
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    color: #1f1f1d;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: #185fa5; }
  #search-results { margin-top: 10px; display: none; }
  .search-count { font-size: 12px; color: #888; padding: 4px 4px 8px; }
  .search-empty {
    padding: 16px; text-align: center; font-size: 13px; color: #888;
    background: #ffffff; border: 1px solid #e8e6df; border-radius: 10px;
  }
  .search-item {
    background: #ffffff; border: 1px solid #e8e6df; border-radius: 10px;
    padding: 11px 13px; margin-bottom: 6px; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .search-item:active { transform: scale(0.99); background: #f5f5f0; }
  .search-item-meta { font-size: 11px; color: #888; margin-bottom: 3px; }
  .search-item-stem { font-size: 13px; line-height: 1.55; color: #1f1f1d; word-break: break-word; }
  mark { background: #faeeda; color: #854f0b; padding: 0 2px; border-radius: 2px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
  .badge-ok { background: #e1f5ee; color: #085041; }
  .badge-no { background: #fcebeb; color: #791f1f; }
  .mode-card {
    background: #ffffff; border: 1px solid #e8e6df; border-radius: 12px;
    padding: 16px; margin-bottom: 10px; cursor: pointer;
    transition: background 0.15s, transform 0.1s; user-select: none;
  }
  .mode-card:active { transform: scale(0.98); background: #f5f5f0; }
  .mode-card.disabled { opacity: 0.45; pointer-events: none; }
  .mode-card-static {
    background: #ffffff; border: 1px solid #e8e6df; border-radius: 12px;
    padding: 16px; margin-bottom: 10px; user-select: none;
  }
  .count-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .count-label { font-size: 13px; color: #888; }
  .count-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .count-pill {
    padding: 6px 12px; background: #f5f5f0; border: 1px solid #e8e6df;
    border-radius: 999px; font-size: 13px; color: #555; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .count-pill:active { transform: scale(0.95); }
  .count-pill.active { background: #1f1f1d; color: #ffffff; border-color: #1f1f1d; }
  .mode-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .mode-desc { font-size: 13px; color: #888; }
  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; font-size: 12px; color: #888;
  }
  .progress-bar { height: 4px; background: #e8e6df; border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
  .progress-fill { height: 100%; background: #185fa5; transition: width 0.3s; }
  .q-card {
    background: #ffffff; border: 1px solid #e8e6df; border-radius: 12px;
    padding: 16px; margin-bottom: 16px;
  }
  .q-stem { font-size: 15px; line-height: 1.75; margin-bottom: 14px; word-break: break-word; }
  .opt {
    display: block; width: 100%; text-align: left; padding: 12px 14px;
    margin-bottom: 8px; background: #ffffff; border: 1px solid #e8e6df;
    border-radius: 10px; font-size: 14px; line-height: 1.6; color: #1f1f1d;
    font-family: inherit; cursor: pointer; transition: background 0.15s, transform 0.1s;
    word-break: break-word;
  }
  .opt:active:not(:disabled) { transform: scale(0.98); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #e1f5ee; border-color: #1d9e75; color: #085041; }
  .opt.wrong { background: #fcebeb; border-color: #e24b4a; color: #791f1f; }
  .opt-key { display: inline-block; width: 22px; font-weight: 600; }
  .explain {
    margin-top: 14px; padding: 14px; background: #f5f5f0; border-radius: 10px;
    font-size: 13px; line-height: 1.75; color: #555; white-space: pre-wrap; word-break: break-word;
  }
  .explain b { color: #1f1f1d; font-weight: 600; display: block; margin-bottom: 6px; }
  /* ---- figures (charts & SPSS-style tables) ---- */
  .fig {
    margin: 0 0 14px; padding: 12px; background: #ffffff;
    border: 1px solid #e8e6df; border-radius: 10px; overflow-x: auto;
  }
  .fig-svg { display: block; width: 100%; max-width: 420px; height: auto; margin: 0 auto; color: #444; }
  .fig-axis { stroke: currentColor; stroke-width: 1; }
  .fig-bar { fill: none; stroke: #185fa5; stroke-width: 1.4; }
  .fig-line { fill: none; stroke: #d06b1f; stroke-width: 1.8; stroke-linejoin: round; }
  .fig-pt { fill: #185fa5; stroke: none; }
  .fig-label { fill: currentColor; font-size: 9px; font-family: inherit; }
  .fig-table {
    border-collapse: collapse; width: 100%; font-size: 12px; line-height: 1.4;
    color: #1f1f1d; background: #ffffff;
  }
  .fig-table th, .fig-table td {
    border: 1px solid #d8d6cf; padding: 5px 7px; text-align: center; vertical-align: middle;
  }
  .fig-table th { background: #f1efe8; font-weight: 600; }
  .fig-table td.lh, .fig-table th.lh { text-align: left; font-weight: 600; }
  .fig-stem td.lf { text-align: right; font-family: "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1px; }
  .fig-stem td.rf { text-align: left;  font-family: "SFMono-Regular", Menlo, Consolas, monospace; letter-spacing: 1px; }
  .fig-stem .stem { background: #f1efe8; font-weight: 600; }
  .fig-cap { font-size: 11px; color: #888; text-align: center; margin: 4px 0; }

  .btn-primary {
    width: 100%; padding: 13px; background: #1f1f1d; color: #ffffff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 500; font-family: inherit;
    cursor: pointer; margin-top: 14px; transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.85; }
  .btn-secondary {
    width: 100%; padding: 11px; background: transparent; color: #888;
    border: 1px solid #e8e6df; border-radius: 10px; font-size: 13px;
    font-family: inherit; cursor: pointer; margin-top: 16px;
  }
  .btn-back {
    background: transparent; border: none; padding: 8px 0; font-size: 14px;
    color: #888; cursor: pointer; font-family: inherit; margin-bottom: 6px;
  }
  .complete { text-align: center; padding: 32px 0; }
  .complete-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f0efe9; }
    .stat-card, .mode-card, .q-card, .mode-card-static { background: #28272a; border-color: #3a3936; }
    .search-input { background: #28272a; border-color: #3a3936; color: #f0efe9; }
    .search-input:focus { border-color: #378add; }
    .search-item { background: #28272a; border-color: #3a3936; }
    .search-item:active { background: #1a1a18; }
    .search-item-stem { color: #f0efe9; }
    .search-empty { background: #28272a; border-color: #3a3936; }
    mark { background: #633806; color: #fac775; }
    .badge-ok { background: #04342c; color: #9fe1cb; }
    .badge-no { background: #501313; color: #f7c1c1; }
    .count-pill { background: #1a1a18; border-color: #3a3936; color: #b5b3ac; }
    .count-pill.active { background: #f0efe9; color: #1a1a18; border-color: #f0efe9; }
    .stat-num { color: #f0efe9; }
    .stat-label, .mode-desc, .meta-row, .btn-back, .btn-secondary { color: #999; }
    .progress-bar { background: #3a3936; }
    .opt { background: #28272a; border-color: #3a3936; color: #f0efe9; }
    .opt.correct { background: #04342c; border-color: #1d9e75; color: #9fe1cb; }
    .opt.wrong { background: #501313; border-color: #e24b4a; color: #f7c1c1; }
    .explain { background: #1a1a18; color: #b5b3ac; }
    .explain b { color: #f0efe9; }
    .btn-primary { background: #f0efe9; color: #1a1a18; }
    .mode-card:active { background: #1a1a18; }
    .btn-secondary { border-color: #3a3936; }
    .fig { background: #28272a; border-color: #3a3936; }
    .fig-svg { color: #b5b3ac; }
    .fig-bar { stroke: #6aa9e0; }
    .fig-line { stroke: #e89a55; }
    .fig-pt { fill: #6aa9e0; }
    .fig-table { color: #f0efe9; background: #28272a; }
    .fig-table th, .fig-table td { border-color: #3a3936; }
    .fig-table th { background: #1f1e21; }
    .fig-stem .stem { background: #1f1e21; }
    .fig-cap { color: #999; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===================================================================
//  統計學刷題 — 題庫資料 (共 360 題，分四篇)
// ===================================================================
const QUESTIONS = [
{ch:1,n:1,stem:"在搜尋專題或論文題目的過程中，有哪些來源可以使用？",opts:["企業界之實務計畫","研讀期刊與書籍","來自報章雜誌的披露","以上皆是"],ans:3,exp:"研究題目的來源可以來自實務問題、學術文獻，也可以來自報章雜誌或社會現象，因此三者都可以使用。"},
{ch:1,n:2,stem:"以下何者不是研究計畫書的內容？",opts:["文獻探討","研究方法","預算編制","結論"],ans:3,exp:"研究計畫書是在研究開始前撰寫，重點是說明研究要怎麼做；結論通常是研究完成後才會出現。"},
{ch:1,n:3,stem:"計畫書的內容始於？",opts:["緒論","文獻探討","研究方法","分析結果"],ans:0,exp:"研究計畫書通常從緒論開始，先說明研究背景、動機與問題，再進入文獻與方法。"},
{ch:1,n:4,stem:"一般而言，文獻探討應包括哪些內容？",opts:["過去與本題目探討相同主題之研究","與本主題相關之理論文獻","與本事研究方法相關之文獻","以上皆是"],ans:3,exp:"文獻探討需要整理相關主題、理論基礎與研究方法，讓研究有依據。"},
{ch:1,n:5,stem:"研究限制可能源自於？",opts:["研究方法","理論假設","統計分析","以上皆是"],ans:3,exp:"研究限制可能來自方法設計、理論假設或統計分析能力，因此三者都可能是限制來源。"},
{ch:1,n:6,stem:"研究者將一系列經驗事物或知識素材為依據，尋找出它的共同規律，並假設同類事物中的其他事物也服從這些規律。此研究方法稱為？",opts:["演繹法","歸納法","實驗法","以上皆是"],ans:1,exp:"由多個個別經驗整理出共同規律，是從特殊推到一般，屬於歸納法。"},
{ch:1,n:7,stem:"研究者以反映客觀規律的理論為依據，並服從已知部分推知事物的未知部分思維方法，稱為？",opts:["演繹法","歸納法","實驗法","以上皆是"],ans:0,exp:"從既有理論或一般原則推導到特定情況，屬於演繹法。"},
{ch:1,n:8,stem:"「所有的人都會死，蘇格拉底是人，所以蘇格拉底會死」是屬於？",opts:["演繹法","歸納法","實驗法","以上皆是"],ans:0,exp:"這是由一般原則推導出個別結論，典型屬於演繹法。"},
{ch:1,n:9,stem:"下列何種方法論是從特殊性到一般的認識過程？",opts:["演繹法","歸納法","實驗法","以上皆是"],ans:1,exp:"從特殊個案推論一般規律，就是歸納法。"},
{ch:1,n:10,stem:"下列何種方法論是從一般到特殊性的認識過程？",opts:["演繹法","歸納法","實驗法","以上皆是"],ans:0,exp:"從一般理論推到特殊情況，就是演繹法。"},
{ch:1,n:11,stem:"下列哪一種研究計畫書的複雜性最低？",opts:["探索性研究","碩博士論文","探索性契約式研究","學生學期報告"],ans:3,exp:"學生學期報告通常規模較小、程序較簡單，因此複雜性最低。"},
{ch:1,n:12,stem:"下列何者非屬社會科學研究範圍？",opts:["精神醫學","管理學","遺傳學","教育學"],ans:2,exp:"遺傳學主要屬於自然科學或生命科學，不屬於典型社會科學範圍。"},
{ch:1,n:13,stem:"以下對研究的說明何者為是？",opts:["研究是需思考的架構","研究必須使用一系列的程序與方法","研究的設計必須是客觀的","以上皆是"],ans:3,exp:"研究需要清楚架構、程序方法與客觀設計，因此三項都正確。"},
{ch:1,n:14,stem:"以下何者非研究的特徵？",opts:["嚴謹性","系統性","主觀性","實驗性"],ans:2,exp:"研究強調客觀、系統與嚴謹，主觀性不是研究應有的特徵。"},
{ch:1,n:15,stem:"「研究主題：社區居民的社會經濟背景」這是屬於哪一類型的研究？",opts:["描述性的研究","相關性的研究","解釋性的研究","以上皆是"],ans:0,exp:"此題主要是在描述社區居民的背景狀況，屬於描述性研究。"},
{ch:1,n:16,stem:"「研究主題：充滿壓力的生活與慢性病間的關係」這是屬於哪一類型的研究？",opts:["描述性的研究","相關性的研究","解釋性的研究","以上皆是"],ans:1,exp:"題目強調兩個變項之間的關係，屬於相關性研究。"},
{ch:1,n:17,stem:"「研究主題：兒童健康照顧服務如何影響嬰兒存活率？」這是屬於哪一類型的研究？",opts:["描述性的研究","相關性的研究","解釋性的研究","以上皆是"],ans:2,exp:"題目想了解照顧服務如何影響存活率，重點在解釋影響原因，屬於解釋性研究。"},
{ch:1,n:18,stem:"「研究主題：護士面對病人瀕臨死亡的態度」這是屬於哪一類型的研究？",opts:["描述性的研究","相關性的研究","解釋性的研究","以上皆是"],ans:0,exp:"題目是在描述護士面對特定情境的態度，屬於描述性研究。"},
{ch:1,n:19,stem:"「研究主題：廣告活動對產品銷售的影響」這是屬於哪一類型的研究？",opts:["描述性的研究","相關性的研究","解釋性的研究","以上皆是"],ans:1,exp:"題目重點在廣告活動與銷售之間的關係，因此依教材答案屬相關性研究。"},
{ch:1,n:20,stem:"「研究主題：公司對於提昇員工工作績效的策略」這是屬於哪一類型的研究？",opts:["描述性的研究","相關性的研究","解釋性的研究","以上皆是"],ans:0,exp:"題目主要整理或描述公司提升績效的策略內容，屬描述性研究。"},
{ch:1,n:21,stem:"「研究主題：對於一項議題為什麼有的人持正向態度？而有的人持反向態度？」這是屬於哪一類型的研究？",opts:["描述性的研究","相關性的研究","解釋性的研究","以上皆是"],ans:2,exp:"題目詢問為什麼態度不同，重點是解釋形成差異的原因。"},
{ch:1,n:22,stem:"研究的過程始於？",opts:["形成研究問題","擬定研究設計","選擇研究樣本","分析資料"],ans:0,exp:"研究通常先從發現並形成研究問題開始，再進行設計、抽樣與資料分析。"},
{ch:1,n:23,stem:"以下何者非文獻探討的理由？",opts:["確認研究問題的範圍","改進研究方法","確認研究的格式","深入研究領域的相關知識"],ans:2,exp:"文獻探討是為了掌握研究問題、改進方法與理解知識，不是為了確認研究格式。\n\n第 24-47 題"},
{ch:1,n:24,stem:"中華民國政府最大的學術研究委託機構是？",opts:["國科會","中研院","行政院研考會","人事行政局"],ans:0,exp:"題目問學術研究委託機構，依教材答案為國科會。"},
{ch:1,n:25,stem:"中華民國政府最大的政府政策研究委託機構是？",opts:["國科會","中研院","行政院研考會","人事行政局"],ans:2,exp:"政府政策研究委託以行政院研考會為主要機構，與第24題的學術研究委託不同。"},
{ch:1,n:26,stem:"下列何種參考文獻的可靠性最高？",opts:["國際學術期刊","政府研究報告","報章雜誌","網路論壇"],ans:0,exp:"國際學術期刊通常經過同儕審查，可靠性通常高於報章、論壇等資料。"},
{ch:1,n:27,stem:"我們在從事一項研究所操控的多項變數通常稱為？",opts:["獨立變數","依變數","結果變數","準則變數"],ans:0,exp:"研究者主動操控或設定的變數，通常稱為獨立變數。"},
{ch:1,n:28,stem:"上閔使用的交通工具的可選擇搭公車=1、騎機車=2、搭捷運=3，這是何種量度尺度？",opts:["順序尺度","區間尺度","名目尺度","以上皆非"],ans:2,exp:"1、2、3只是類別代碼，沒有大小或順序意義，因此屬名目尺度。"},
{ch:1,n:29,stem:"統計學上有四種測量尺度：名目尺度、順序尺度、等比尺度，以何種尺度？",opts:["標準尺度","有效尺度","區間尺度","類別尺度"],ans:2,exp:"四種常見測量尺度為名目、順序、區間、比例；題目缺少的是區間尺度。"},
{ch:1,n:30,stem:"「大隊接力賽跑中甲班得到冠軍、丙班得到亞軍」句中的「冠軍」「亞軍」是何種量度尺度？",opts:["順序尺度","區間尺度","名目尺度","以上皆非"],ans:0,exp:"冠軍、亞軍代表名次先後，有順序意義，因此是順序尺度。"},
{ch:1,n:31,stem:"「阿丁體重65公斤」句中的「65公斤」是何種量度尺度？",opts:["順序尺度","區間尺度","名目尺度","以上皆非"],ans:3,exp:"依教材答案為D。一般統計概念中體重屬比例尺度，但此題選項沒有比例尺度，因此選以上皆非。"},
{ch:1,n:32,stem:"「陳偉欣的球衣號碼」在量度尺度分類中屬於下列那一種？",opts:["名目尺度（nominal scale）","順序尺度（ordinal scale）","區間尺度（interval scale）","比率尺度（ratio scale）"],ans:0,exp:"球衣號碼只是辨識類別的代碼，不能代表大小或數值差距，因此屬名目尺度。"},
{ch:1,n:33,stem:"調查化妝品市場消費者職業別，可用下列何種尺度來衡量？",opts:["名目尺度（nominal scale）","順序尺度（ordinal scale）","區間尺度（interval scale）","無法判斷"],ans:0,exp:"職業別是類別分類，例如學生、上班族、服務業等，屬名目尺度。"},
{ch:1,n:34,stem:"溫度在資料的尺度中是屬於？",opts:["名義尺度","順序尺度","等距尺度","比例尺度"],ans:2,exp:"一般攝氏或華氏溫度有固定間距，但沒有真正的絕對零點，因此屬等距尺度。"},
{ch:1,n:35,stem:"我們在從事一項研究所掌握的多項預測變數，稱為？",opts:["獨立變數","依變數","結果變數","準則變數"],ans:0,exp:"預測變數通常用來解釋或預測結果變數，因此可視為獨立變數。"},
{ch:1,n:36,stem:"我們在從事一項研究所先行掌握的多項變數，稱為？",opts:["獨立變數","依變數","結果變數","準則變數"],ans:0,exp:"研究中先行掌握、用來影響或預測其他變數的變數，通常稱為獨立變數。"},
{ch:1,n:37,stem:"我們在從事一項研究欲推測影響的變數，稱為？",opts:["獨立變數","依變數","操控變數","自變數"],ans:1,exp:"被研究者用來觀察是否受到影響的結果，就是依變數。"},
{ch:1,n:38,stem:"我們在從事一項研究欲測量的結果變數，稱為？",opts:["獨立變數","依變數","操控變數","自變數"],ans:1,exp:"研究要測量的結果或被影響的變數，就是依變數。"},
{ch:1,n:39,stem:"小銘從事一項研究探討服務品質構面對服務滿意度的影響，那服務品質構面稱為？",opts:["獨立變數","依變數","結果變數","準則變數"],ans:0,exp:"服務品質構面是用來解釋或影響服務滿意度的變數，因此是獨立變數。"},
{ch:1,n:40,stem:"小銘從事一項研究探討服務品質構面對服務滿意度的影響，那服務滿意度稱為？",opts:["獨立變數","依變數","結果變數","準則變數"],ans:1,exp:"服務滿意度是被服務品質影響、研究要觀察的結果，因此是依變數。"},
{ch:1,n:41,stem:"甲透過乙影響丙，則甲為？",opts:["獨立變數","中介變數","依變數","干擾變數"],ans:0,exp:"甲是影響流程的起點，先影響乙，再間接影響丙，因此甲是獨立變數。"},
{ch:1,n:42,stem:"甲透過乙影響丙，則乙為？",opts:["獨立變數","中介變數","依變數","干擾變數"],ans:1,exp:"乙位於甲與丙之間，負責傳遞影響效果，因此是中介變數。"},
{ch:1,n:43,stem:"甲透過乙影響丙，則丙為？",opts:["獨立變數","中介變數","依變數","干擾變數"],ans:2,exp:"丙是最後被影響的結果變數，因此是依變數。"},
{ch:1,n:44,stem:"高教授從事一項研究探討服務品質會不會透過服務滿意度影響顧客忠誠度，那服務滿意度稱為？",opts:["獨立變數","中介變數","依變數","干擾變數"],ans:1,exp:"服務滿意度位在服務品質與顧客忠誠度之間，扮演傳遞效果的角色，所以是中介變數。"},
{ch:1,n:45,stem:"在從事研究時，當獨立變項與依變項之間的關係很強，我們可能想要用以下哪一個變項來解釋獨立變項是如何影響依變項的？",opts:["調節變數","中介變數","獨立變數","干擾變數"],ans:1,exp:"中介變數用來說明獨立變數透過什麼機制影響依變數。"},
{ch:1,n:46,stem:"在從事研究時，當獨立變項與依變項之間的關係沒那麼強或是不一致，我們一般可能會想要從什麼變項探討獨立變項對依變項的影響關係？",opts:["操控變數","中介變數","獨立變數","干擾變數"],ans:3,exp:"當關係強弱不一致時，可能受到第三變項影響，需檢查干擾變數。"},
{ch:1,n:47,stem:"有一份研究報告指出，薪資報酬變成佣金制度，將導致業務人員銷售力的增加，尤其對已婚的業務人員而言，那麼「婚姻」條件是屬於此研究的？",opts:["操控變數","中介變數","獨立變數","干擾變數"],ans:3,exp:"婚姻條件會改變薪資制度與銷售力之間關係的強弱，因此是干擾變數。\n\n第 48-77 題"},
{ch:1,n:48,stem:"自變數以外，凡是可能影響結果（依變數）之因素，稱之為？",opts:["獨立變數","中介變數","外生變數","干擾變數"],ans:2,exp:"外生變數是研究模型之外，但可能影響依變數的因素。"},
{ch:1,n:49,stem:"下列何者非名目量表？",opts:["性別","職業","溫度","宗教別"],ans:2,exp:"性別、職業與宗教別都是類別，屬名目量表；溫度屬等距尺度。"},
{ch:1,n:50,stem:"下列何者屬比率量表？",opts:["性別","溫度","年齡","名次"],ans:2,exp:"年齡有真正零點，且可比較倍數關係，因此屬比率量表。"},
{ch:1,n:51,stem:"下列何者屬順序量表？",opts:["性別","溫度","年齡","名次"],ans:3,exp:"名次具有先後順序，但名次間差距不一定相等，因此屬順序量表。"},
{ch:1,n:52,stem:"研究者可以系統化操弄或安排的變項稱為？",opts:["結果變項","獨立變項","依變項","以上皆是"],ans:1,exp:"研究者可操弄或安排的變項是獨立變項。"},
{ch:1,n:53,stem:"研究想要了解，在不同的年齡下，性格對動機的影響是否有所不同，請問誰是干擾變數？",opts:["年齡","性格","動機","態度"],ans:0,exp:"年齡會影響性格對動機之間關係的強弱或方向，因此是干擾變數。"},
{ch:1,n:54,stem:"呈現研究變項之間關係的圖示，稱為？",opts:["研究藍圖","研究流程圖","研究計劃圖","研究架構圖"],ans:3,exp:"用圖示呈現變項與變項之間關係，通常稱研究架構圖。"},
{ch:1,n:55,stem:"能說明研究變數之間的關係，稱為？",opts:["研究假說（設）","研究方法","統計分析","以上皆非"],ans:0,exp:"研究假說用來說明或預測變數間的關係。"},
{ch:1,n:56,stem:"對某些變數在若干特定的狀況下，會同時出現，但彼此間未必有一定有因果關係，此假說稱之為？",opts:["關聯性假說","解釋性假說","因果性假說","以上皆是"],ans:0,exp:"只說明變數彼此有關聯，未必代表因果，稱為關聯性假說。"},
{ch:1,n:57,stem:"假設一個變數的存在或改變，會誘發或引導另一個變數的變化，此假說稱之為？",opts:["關聯性假說","描述性假說","因果性假說","以上皆是"],ans:2,exp:"一個變數導致另一個變數改變，強調因果關係，因此是因果性假說。"},
{ch:1,n:58,stem:"由於某些研究問題缺乏前人的研究經驗，屬於首次從事之研究，所以對各變項間的關係不太清楚，並缺乏理論根據，在研究類別上可稱為？",opts:["探索性的研究","敘述性的研究","因果性的研究","實驗室研究法"],ans:0,exp:"當研究主題較新、缺乏既有理論與資料時，通常先採探索性研究。"},
{ch:1,n:59,stem:"以下何種情形不需要做市場調查來了解消費者的意願？",opts:["果汁口味","調降電價","拍電影","蓋房子"],ans:1,exp:"調降電價通常不需要透過市場調查確認消費者意願，因為多數消費者自然會偏好價格降低。"},
{ch:1,n:60,stem:"為了釐清與定義一研究問題的本質所做的初始研究，一般而言研究結構較鬆散，稱之為？",opts:["敘述性研究","因果性研究","結論式研究","探索性研究"],ans:3,exp:"探索性研究常用於初步了解問題本質，研究結構較彈性。"},
{ch:1,n:61,stem:"下列何者是探索性研究最常使用的方法？",opts:["次級資料分析","焦點群體訪談","專家訪談","以上皆非"],ans:1,exp:"依教材答案為焦點群體訪談，常用來蒐集初步看法與探索議題。"},
{ch:1,n:62,stem:"公司對於特殊服務流失事件的研究，最好採用何種研究方法？",opts:["量化研究","質化研究","實驗研究","以上皆非"],ans:1,exp:"特殊服務流失事件需要深入了解原因、經驗與情境，適合質化研究。"},
{ch:1,n:63,stem:"用來測量消費者知識、意見、態度與行為，最好採用何種研究方法？",opts:["量化研究","質化研究","實驗研究","以上皆非"],ans:0,exp:"知識、意見、態度與行為可透過問卷量化測量，適合量化研究。"},
{ch:1,n:64,stem:"下列何者研究非屬小樣本的研究方法？",opts:["量化研究","質化研究","實驗研究","以上皆非"],ans:0,exp:"量化研究通常需要較大樣本，以利統計分析，因此非屬小樣本研究方法。"},
{ch:1,n:65,stem:"以下何種關係相關最高？",opts:["學歷與性別","學歷與收入","學歷與知識","學歷與身高"],ans:2,exp:"學歷與知識的概念關聯較直接，因此相關性最高。"},
{ch:1,n:66,stem:"在了解某些團體或人群的特徵研究，在研究類別上可稱為？",opts:["探索性的研究","敘述性的研究","因果性的研究","實驗室研究法"],ans:1,exp:"描述特定群體或人群特徵，屬於敘述性研究。"},
{ch:1,n:67,stem:"為驗證分析性假設，證實變項間的因果關係，在研究類別上可稱為？",opts:["探索性的研究","敘述性的研究","因果性的研究","實驗室研究法"],ans:2,exp:"驗證變項間因果關係，屬因果性研究。"},
{ch:1,n:68,stem:"常被用於理工學系的專題與研究，並利用科學方法要求精確、客觀與可重複驗證，在研究類別上可稱為？",opts:["探索性的研究","敘述性的研究","因果性的研究","實驗室研究法"],ans:3,exp:"理工研究常在可控制環境中進行，強調精確與可重複驗證，屬實驗室研究法。"},
{ch:1,n:69,stem:"對於研究對象採取較長時間的觀察，這種研究稱之為？",opts:["縱貫性研究","橫斷性研究","以上皆是","以上皆非"],ans:0,exp:"長時間追蹤同一研究對象，屬縱貫性研究。"},
{ch:1,n:70,stem:"「服務品質」（X因素）會影響「顧客滿意度」（Y因素），這類X因素是否導致Y因素出現的研究稱為？",opts:["因果研究","觀察研究","個案研究","相關研究"],ans:0,exp:"題目強調X是否導致Y出現，重點是因果影響，因此是因果研究。"},
{ch:1,n:71,stem:"下列不屬於相關關係的現象是？",opts:["企業的投資與產出","收入與存款","電視機產量與西瓜產量","銷售額與銷售價格"],ans:2,exp:"電視機產量與西瓜產量通常沒有合理關聯，其他選項較可能存在經濟或市場關係。"},
{ch:1,n:72,stem:"我想了解大家喜歡吃什麼水果，您建議應該要設計？",opts:["單選題","是非題","複選題","申論題"],ans:2,exp:"喜歡的水果可能不只一種，因此應設計複選題。"},
{ch:1,n:73,stem:"下列何者非量化研究設計的特性？",opts:["研究計畫開始便已決定","預期一致性","涵蓋橫斷面與縱斷面研究","不需要有前置準備"],ans:3,exp:"量化研究通常需要事前設計、抽樣與工具規劃，不是不需要前置準備。"},
{ch:1,n:74,stem:"研究設計不包括哪一層面？",opts:["研究問題","實施流程","研究假設","研究抽樣"],ans:0,exp:"依教材答案，研究問題屬研究起點，不列為研究設計的層面。"},
{ch:1,n:75,stem:"下列何種研究，資料蒐集的時間最短？",opts:["橫斷面研究","縱斷面研究","橫縱斷交叉研究","時間序列研究"],ans:0,exp:"橫斷面研究是在某一時間點蒐集資料，時間通常最短。"},
{ch:1,n:76,stem:"下列何者非探索性研究計畫書的內容要件？",opts:["問題陳述","研究目的","研究設計","資料分析"],ans:3,exp:"探索性研究計畫重點在問題、目的與設計，資料分析多屬研究執行後的部分。"},
{ch:1,n:77,stem:"下列何者非探索性研究計畫書的內容要件？",opts:["問題陳述","研究目的","研究設計","研究結果的性質與形式"],ans:3,exp:"研究結果的性質與形式較偏研究完成後的呈現，不是探索性研究計畫書的必要內容。"},
{ch:2,n:78,stem:"下列哪一種次級資料最具可靠度？",opts:["雜誌","報紙","網路論壇","學術期刊"],ans:3,exp:"學術期刊通常經過審查或學術規範，比一般媒體與論壇更具可信度。"},
{ch:2,n:79,stem:"下列哪一種次級資料最具可靠度？",opts:["政府統計","雜誌調查","網路調查","報紙調查"],ans:0,exp:"政府統計通常有固定調查制度與公開標準，可靠度通常高於一般媒體調查。"},
{ch:2,n:80,stem:"研究者所蒐集的資料可分為？",opts:["質性資料","量化資料","以上皆是","以上皆非"],ans:2,exp:"研究資料可分為質性資料與量化資料兩大類，因此兩者皆是。"},
{ch:2,n:81,stem:"若透過開放式訪談所獲得的資料稱為？",opts:["質性資料","量化資料","以上皆是","以上皆非"],ans:0,exp:"開放式訪談多取得文字、經驗、態度等非數字內容，屬於質性資料。"},
{ch:2,n:82,stem:"哪一種分析方法是將質性資料轉化為量化資料，然後再依量化的分析方法進行分析？",opts:["內容分析法","比較分析法","以上皆是","以上皆非"],ans:0,exp:"內容分析法會把文字、訪談或文件內容編碼成類別或次數，再進行量化分析。"},
{ch:2,n:83,stem:"觀察法的優點是可以將實地觀察到的現象做成記錄，以下何者非觀察法的特性？",opts:["要有觀察的目標","要有系統的記錄","可有個人主觀判斷","需可以重複查證"],ans:2,exp:"觀察法應盡量客觀、系統化，避免研究者個人主觀判斷影響結果。"},
{ch:2,n:84,stem:"經由談話的途徑來了解某些人、事、行動或態度，進而彙總出研究所需的資料與資訊，稱為？",opts:["訪問法","觀察法","問卷調查法","以上皆非"],ans:0,exp:"透過談話取得資訊，就是訪問法或訪談法的核心。"},
{ch:2,n:85,stem:"在訪問法中，將問題標準化，然後所有受訪者都是回答同一結構的問題，此種訪問法稱為？",opts:["導向式訪問","標準化訪問","控制式訪問","以上皆非"],ans:1,exp:"題目強調問題標準化、受訪者回答同一結構，符合標準化訪問。"},

{ch:2,n:87,stem:"下列何者不是電話調查的優點？",opts:["省時","省錢","所得樣本一定是簡單隨機抽樣","電話調查可利用電腦輔助，通話中可直接輸入資料，可即刻檢查輸入資料的明顯錯誤"],ans:2,exp:"電話調查可能受電話名冊、接聽率等影響，不能保證一定是簡單隨機抽樣。"},
{ch:2,n:88,stem:"因郵寄問卷回收率過低所成的偏估，可藉由下列何者方式避免？",opts:["郵寄更多問卷","對於樣本中未回答者，進行進一步調查","對於樣本中回答者，進行進一步調查","放棄未回答者的意見，把它當成無效樣本"],ans:1,exp:"無反應偏差可透過追蹤未回答者、進一步調查來降低。"},
{ch:2,n:89,stem:"大大有線電視公司為預測晨間新聞節目的收視率，在收視戶中加裝收視率監控器，這種資料蒐集的方法是屬於？",opts:["派員調查","郵寄問卷調查","實驗性資料","觀察性資料"],ans:3,exp:"用監控器記錄實際收視行為，是觀察行為資料，不是問卷或實驗。"},

{ch:2,n:91,stem:"各種報紙、雜誌、期刊、電子資料庫上之文獻、統計資料，以上均可稱為？",opts:["次級資料","初級資料","秘密資料","採礦資料"],ans:0,exp:"既有文獻與統計資料並非研究者親自為本研究蒐集，屬次級資料。"},

{ch:2,n:95,stem:"下列哪一個資料的取得對研究機構可降低成本與時效？",opts:["次級資料","初級資料","秘密資料","採礦資料"],ans:0,exp:"次級資料是既有資料，通常取得較快、成本較低。"},

{ch:2,n:99,stem:"下列哪一種研究方法樣本數一般比較少？",opts:["電話調查","郵寄調查","網路調查","實驗法"],ans:3,exp:"實驗法常因控制條件與操作成本較高，樣本數通常較少。"},

{ch:2,n:134,stem:"下列何種調查方法資訊正確性較高？",opts:["郵寄","電訪","面訪","網路調查"],ans:2,exp:"面訪可由訪員確認題意與回答狀況，資訊正確性相對較高。"},

{ch:2,n:147,stem:"下列哪一種研究方法的優點可以操縱變數？",opts:["調查法","訪談法","觀察法","實驗法"],ans:3,exp:"實驗法的特色是操弄自變項以檢驗效果。"},
{ch:2,n:148,stem:"下列哪一種研究方法的優點是外生變數可以較有效受到控制？",opts:["調查法","訪談法","觀察法","實驗法"],ans:3,exp:"實驗設計可控制外生變數，較能推論因果關係。"},
{ch:2,n:149,stem:"下列哪一種研究方法的人為性因素最受詬病？",opts:["調查法","訪談法","觀察法","實驗法"],ans:3,exp:"實驗法常在人工控制情境下進行，因此人為性較容易被批評。"},
{ch:2,n:150,stem:"研究者參考行政院主計處的人口統計與經濟統計資料，是屬於何種資料？",opts:["初級資料","次級資料","三級資料","以上皆非"],ans:1,exp:"使用既有官方統計資料，屬於次級資料。"},
{ch:2,n:151,stem:"下列何種機構，所蒐集之資料具廣泛性，且對歷史性資料保存也比較完善？",opts:["學術研究機構","國際組織","商業電子資料庫","政府部門"],ans:3,exp:"政府部門資料涵蓋範圍廣，且常有長期保存與公開制度。"},
{ch:2,n:152,stem:"以下何者非初級資料蒐集方法？",opts:["網路搜尋","電話調查","現場觀察","人員訪談"],ans:0,exp:"網路搜尋多是查找既有資料，不是研究者直接蒐集初級資料的方法。"},
{ch:2,n:153,stem:"下列何項非使用次級資料，應注意事項？",opts:["正確性","比較性","敏感性","方便性"],ans:3,exp:"使用次級資料應注意正確性、比較性等，方便性不是品質判斷重點。"},
{ch:2,n:154,stem:"以下針對初級資料與次級資料的敘述何者為是？",opts:["初級資料的取得時間較次級資料短","初級資料的取得成本較次級資料高","次級資料為第一手資料","以上皆非"],ans:1,exp:"初級資料需自行設計與蒐集，通常成本高於次級資料。"},
{ch:2,n:155,stem:"有關所得水準與人口狀況，是為何種資料內容？",opts:["經濟環境","政治環境","法律環境","文化環境"],ans:0,exp:"所得與人口狀況常用來描述市場或社會的經濟環境。"},
{ch:2,n:156,stem:"企業內部的資料來源，不包括以下哪一項？",opts:["人事部門","生產部門","工商社團","行銷部門"],ans:2,exp:"工商社團屬企業外部機構，不是企業內部資料來源。"},
{ch:2,n:157,stem:"企業外部資源來源，不包括以下哪一項？",opts:["出版單位","政府機構","民間機構","財務部門"],ans:3,exp:"財務部門屬企業內部部門，不是外部資料來源。"},
{ch:2,n:158,stem:"觀光統計年報的資訊應該在哪一個機構可以取得？",opts:["內政部","教育部","交通部","財政部"],ans:2,exp:"觀光業務與交通部相關，觀光統計年報可由交通部相關單位取得。"},
{ch:2,n:159,stem:"下列何種方法非質化的方法？",opts:["個別深度訪談","觀察法","封閉式問卷調查法","次級資料分析法"],ans:2,exp:"封閉式問卷調查常將答案量化，屬量化調查方法。"},
{ch:2,n:160,stem:"下列何者非量化研究的特性？",opts:["抽樣一般採非機率性","統計與數學方法之運用","電腦化分析為主","大樣本研究"],ans:0,exp:"量化研究多使用機率抽樣與大樣本，非機率抽樣較常見於質化研究。"},
{ch:2,n:161,stem:"觀察表、訪談大綱、問卷……這些蒐集資料的方法都可以統稱為？",opts:["操作工具","研究工具","研究手法","操作手法"],ans:1,exp:"觀察表、訪談大綱與問卷都是用來蒐集資料的研究工具。"},
{ch:2,n:162,stem:"問卷問題為「您知道台灣最大的國際品牌嗎？」是為了解？",opts:["事實","知識","態度","行為"],ans:1,exp:"詢問是否知道某資訊，主要測量受訪者知識。"},
{ch:2,n:163,stem:"問卷問題為「您喜歡日本品牌的程度？」是為了解？",opts:["事實","知識","態度","行為"],ans:2,exp:"喜歡程度屬於個人態度或評價。"},
{ch:2,n:164,stem:"問卷問題為「您平均一星期到7-11幾次？」是為了解？",opts:["事實","知識","態度","行為"],ans:3,exp:"詢問到店頻率，是在測量實際行為。"},
{ch:2,n:165,stem:"問卷問題為「您平均一天使用電腦幾小時？」是為了解？",opts:["事實","知識","態度","行為"],ans:3,exp:"使用時間是行為頻率的測量。"},
{ch:2,n:166,stem:"問卷問題為「您個人擁有幾支手機？」是為了解？",opts:["事實","知識","態度","行為"],ans:0,exp:"擁有幾支手機屬客觀事實。"},
{ch:2,n:167,stem:"問卷問題為「您個人擁有的手機品牌是？」是為了解？",opts:["事實","知識","態度","行為"],ans:0,exp:"手機品牌屬受訪者的客觀事實資料。"},
{ch:2,n:168,stem:"問卷問題為「您對政府行政效率的滿意度為何？」是為了解？",opts:["事實","知識","態度","行為"],ans:2,exp:"滿意度屬於受訪者態度或評價。"},
{ch:2,n:169,stem:"問卷題目由問卷設計者先預設好可能之答案，稱之為？",opts:["封閉式問卷","開放式問卷","非結構式問卷","半結構式問卷"],ans:0,exp:"答案選項預先設計好的題型稱為封閉式問卷。"},
{ch:2,n:170,stem:"複選題是屬於？",opts:["封閉式多重問卷","開放式問卷","非結構式問卷","半結構式問卷"],ans:0,exp:"複選題提供固定選項讓填答者選擇，屬封閉式多重選擇題。"},
{ch:2,n:171,stem:"問卷題目之答案，由答題者依其主觀意志敘述答案，稱之為？",opts:["封閉式問卷","開放式問卷","非結構式問卷","半結構式問卷"],ans:1,exp:"由填答者自由敘述答案，即開放式問卷。"},
{ch:2,n:172,stem:"探索性研究一般都採用何種問卷方式居多？",opts:["封閉式問卷","開放式問卷","非結構式問卷","半結構式問卷"],ans:1,exp:"探索性研究重視發掘想法與意見，常用開放式問卷。"},
{ch:2,n:173,stem:"量化研究一般都採用何種問卷方式居多？",opts:["封閉式問卷","開放式問卷","非結構式問卷","半結構式問卷"],ans:0,exp:"量化研究需便於編碼與統計分析，因此常用封閉式問卷。"},
{ch:2,n:174,stem:"質性研究一般都採用何種問卷方式居多？",opts:["封閉式問卷","開放式問卷","非結構式問卷","半結構式問卷"],ans:1,exp:"質性研究重視受訪者描述與脈絡，常用開放式問卷。"},
{ch:2,n:175,stem:"對於市場調查中，要衡量「態度」，最常用的量表是？",opts:["史德培尺度法","索斯洞尺度法","李克特尺度法","以上皆非"],ans:2,exp:"李克特量表常用於測量同意程度、滿意度與態度。"},
{ch:2,n:176,stem:"問卷預試的目的主要在於？",opts:["預測結論","增加作業流程","增加樣本","修改問卷不當之處"],ans:3,exp:"預試可找出題目不清楚、選項不完整等問題並修正問卷。"},
{ch:2,n:177,stem:"一個良好的衡量工具應具有足夠的？",opts:["信度","效度","以上皆是","以上皆非"],ans:2,exp:"良好衡量工具需同時具備信度與效度。"},
{ch:2,n:178,stem:"一種衡量工具可以真正測出研究者所想要衡量事物的程度，稱為？",opts:["信度","效度","以上皆是","以上皆非"],ans:1,exp:"效度表示工具是否真的測到想測的概念。"},
{ch:2,n:179,stem:"用來衡量工具的穩定性，稱為？",opts:["信度","效度","以上皆是","以上皆非"],ans:0,exp:"信度指測量結果的一致性與穩定性。"},
{ch:2,n:180,stem:"內部一致性是屬於？",opts:["信度","效度","以上皆是","以上皆非"],ans:0,exp:"內部一致性用來檢查量表題項是否穩定一致，屬信度概念。"},
{ch:2,n:181,stem:"以下何者非效度的類型？",opts:["內容效度","關聯效度","構念效度","經濟效度"],ans:3,exp:"常見效度包括內容效度、關聯效度與構念效度，沒有經濟效度。"},
{ch:2,n:182,stem:"衡量的工具能夠足以涵蓋研究主題的程度，就稱為？",opts:["內容效度","關聯效度","構念效度","經濟效度"],ans:0,exp:"內容效度關心測量內容是否完整涵蓋研究主題。"},
{ch:2,n:183,stem:"表面效度又稱為？",opts:["內容效度","關聯效度","構念效度","經濟效度"],ans:0,exp:"依原題答案，表面效度在此歸於內容效度的概念。"},
{ch:2,n:184,stem:"衡量工具實際衡量的是什麼，這是哪一種效度關心的重點？",opts:["內容效度","關聯效度","構念效度","經濟效度"],ans:2,exp:"構念效度關心工具是否測到理論構念本身。"},
{ch:2,n:185,stem:"對測量或操弄變項的程序做清楚敘述，稱之為？",opts:["描述性定義","解釋性定義","操作型定義","以上皆非"],ans:2,exp:"操作型定義會清楚說明變項如何被測量或操弄。"},
{ch:2,n:186,stem:"下列何者非測量工具應該具備的主要條件？",opts:["效度","信度","可行性","差異性"],ans:3,exp:"測量工具通常重視信度、效度與可行性，差異性不是主要條件。"},
{ch:2,n:187,stem:"下列哪一個效度估計方法未涉及人為判斷？",opts:["內容效度","效標關聯效度","構念效度","以上皆非"],ans:1,exp:"效標關聯效度可透過測量結果與外部效標的統計關聯估計，較不依賴主觀判斷。"},
{ch:2,n:188,stem:"下列哪一項描述是正確的？",opts:["信度高，效度一定高","效度高，信度一定高","效度低，信度一定低","以上皆非"],ans:1,exp:"若測量具有高效度，表示它能正確測量目標概念，通常也需具備一定信度。"},
{ch:2,n:189,stem:"下列何者非測量信度的面向？",opts:["穩定性","等值性","可行性","內容一致性"],ans:2,exp:"信度常看穩定性、等值性與內部一致性，可行性不是信度面向。"},
{ch:2,n:190,stem:"下列何者測量工具應該具備的可行性包含哪些特性？",opts:["經濟性","便利性","可解釋性","以上皆是"],ans:3,exp:"可行性需考量成本、便利程度與結果能否解釋。"},
{ch:2,n:191,stem:"下列何者是測量誤差的主要來源？",opts:["調查對象","測量工具","測量情境","以上皆是"],ans:3,exp:"測量誤差可能來自受訪者、工具設計與施測情境。"},
{ch:2,n:192,stem:"最常被使用的態度量表是？",opts:["李克特（Likert）量表","語意差別（SD）量表","簡單分類量表","Stapel量表"],ans:0,exp:"李克特量表最常用於態度、滿意度與同意程度測量。"},
{ch:3,n:193,stem:"以下樣本調查的敘述何者為非？",opts:["樣本調查在於追求普遍性的事實","樣本調查不需要驗證","樣本調查在於化繁為簡","樣本調查需要依邏輯進行"],ans:1,exp:"樣本調查仍需依研究邏輯與方法進行，也需要驗證與檢核資料是否可信；因此「不需要驗證」是錯誤敘述。"},
{ch:3,n:194,stem:"抽樣的缺點在於只能估計或預測，無法得知母群體的特徵；但抽樣又有其優點，以下何者為非抽樣的優點？",opts:["節省人力調查所有樣本","提高研究的準確性","節省金錢","節省時間去分析所有樣本"],ans:1,exp:"抽樣的主要優點通常是省時、省錢、省人力；但抽樣本身仍可能產生抽樣誤差，不能直接說一定提高研究準確性。"},
{ch:3,n:195,stem:"從高雄市市民挑選出搭乘捷運上下班者，調查他們每個月支出的交通費及花費的時間，請問在抽樣的概念上，「搭乘捷運上下班者」可稱為？",opts:["母群體","抽樣單位","樣本","母數"],ans:2,exp:"被實際挑選出來並接受調查的一群人，是從母群體中抽出的研究對象，稱為樣本。"},
{ch:3,n:196,stem:"大學從各班級學生中，抽取學號後一碼為 5 的學生，參加學校行政滿意度調查。請問在抽樣的概念上，「所有班級學生」可稱為？",opts:["母群體","抽樣單位","樣本","母數"],ans:0,exp:"所有班級學生是研究想了解的完整對象範圍，屬於母群體。"},
{ch:3,n:197,stem:"大雄補習班想了解報名統計檢定學生的平均年齡，以做為日後招生宣傳期間的參考。請問在抽樣的概念上，探討「學生的平均年齡」稱為？",opts:["母群體","抽樣單位","樣本","母數"],ans:3,exp:"母數是母群體的特徵值，例如母群體的平均數、比例等；學生平均年齡屬於要估計的母數。"},
{ch:3,n:198,stem:"大學從各班級學生中，抽取學號後一碼為 6 的學生，參加學校行政滿意度調查，總共抽樣 205 位學生。請問在抽樣的概念上，「205 位學生」可稱為？",opts:["母群體","抽樣單位","樣本","樣本大小"],ans:3,exp:"205 位指的是樣本中的人數，也就是樣本大小。"},
{ch:3,n:199,stem:"在抽樣的概念上，抽選學校各班學生、城市裡調查家戶所得或調查選民民意，這些抽選的方法又可稱為？",opts:["抽樣設計","抽樣架構","抽樣樣本","抽樣單位"],ans:0,exp:"如何從母群體中選出研究對象，屬於抽樣設計的範圍。"},
{ch:3,n:200,stem:"在抽樣的概念上，抽選學校各班學生、城市裡調查家戶所得或調查選民民意，「學生」、「家戶」、「選民」可稱為？",opts:["母群體","抽樣單位","樣本","樣本大小"],ans:1,exp:"被抽取的基本個體或單位稱為抽樣單位，例如學生、家戶、選民。"},
{ch:3,n:201,stem:"S 大學從各班級學生中，挑選學號後一碼為 6 的學生，參加學校行政滿意度調查，總共挑選 205 位學生，請問這個過程稱為？",opts:["研究","統計","抽樣","分析"],ans:2,exp:"從母群體中挑選部分對象進行研究的過程稱為抽樣。"},
{ch:3,n:202,stem:"請問下列何者為抽樣架構的英文？",opts:["Sampling frame","Sampling unit","Sampling strategy","Sampling design"],ans:0,exp:"抽樣架構的英文是 sampling frame。"},
{ch:3,n:203,stem:"補習班經過訪問取得樣本所有學生平均年齡，學校經過問卷調查取得樣本學生所有行政滿意度，這些資訊在抽樣的概念上又稱為？",opts:["樣本單位","抽樣單位","抽樣母體","樣本的統計量"],ans:3,exp:"由樣本資料計算出的平均數、滿意度等結果，稱為樣本統計量。"},
{ch:3,n:204,stem:"有關抽樣的原則以下何者敘述為正確？",opts:["在樣本的統計量與母群體的真實母數間存在差異，主要是由於樣本中所選的個體不同造成","母體愈大，所估計的母群體樣本數更正確","研究的樣本變項的差異越大，則樣本統計量與母群體平均數間的差異越大","以上皆正確"],ans:0,exp:"抽樣誤差主要來自於抽到的樣本個體不同，使樣本統計量與母群體真實母數產生差異。"},
{ch:3,n:205,stem:"在樣本的統計量與母群體的真實母數間通常都存在差異，是以下何者原因造成？",opts:["母體群太小","樣本中所選個體不同","抽樣設計錯誤","樣本的統計量不足"],ans:1,exp:"不同樣本會包含不同個體，因此計算出的樣本統計量可能不同，這就是抽樣差異的主要來源。"},
{ch:3,n:206,stem:"以下何種方式可使估計的母群體母數較為正確？",opts:["提高樣本的大小","減少抽樣單位","提高母群體數量","減少母數"],ans:0,exp:"一般而言，樣本數越大，抽樣誤差通常越小，估計母群體母數會較穩定。"},
{ch:3,n:207,stem:"抽樣策略可分為二大類，下列何者為非？",opts:["隨機抽樣","混合抽樣","機率抽樣","標準抽樣"],ans:3,exp:"抽樣常分為機率抽樣與非機率抽樣；「標準抽樣」不是常見的二大抽樣策略分類。"},
{ch:3,n:208,stem:"下列何者非「非隨機抽樣」？",opts:["集群抽樣","滾雪球抽樣","立意抽樣","便利抽樣"],ans:0,exp:"集群抽樣屬於機率抽樣的一種，不屬於非隨機抽樣。"},
{ch:3,n:209,stem:"下列何者非「抽樣類型」？",opts:["定額抽樣","分層隨機抽樣","集合抽樣","簡單隨機抽樣"],ans:2,exp:"常見名稱為集群抽樣，不是「集合抽樣」；因此此選項不屬於正確的抽樣類型名稱。"},
{ch:3,n:210,stem:"研究上為什麼要「抽樣」，以下何者非其原因？",opts:["把握時效","非政策性調查","母體過大","母體某些單位難以接觸"],ans:1,exp:"抽樣常因母體大、難以全面接觸、需要省時而採用；是否為政策性調查不是抽樣的主要原因。"},
{ch:3,n:211,stem:"當母體過大，且其中某些基本單位難以接觸時，在研究可建議用何種方式蒐集資料？",opts:["訪問法","觀察法","抽樣法","以上皆非"],ans:2,exp:"母體過大或難以全部接觸時，通常可透過抽樣法取得代表性資料。"},
{ch:3,n:212,stem:"機率抽樣方法中，「摸彩法」及「亂數法」是屬於以下何種抽樣？",opts:["系統隨機抽樣","集群抽樣","立意抽樣","簡單隨機抽樣"],ans:3,exp:"摸彩法、亂數法都是讓母群體成員有相同或已知機會被抽中，屬於簡單隨機抽樣。"},
{ch:3,n:213,stem:"機率抽樣方法中，當母體數小又有適當的抽樣底冊，是屬何種抽樣？",opts:["系統隨機抽樣","集群抽樣","立意抽樣","簡單隨機抽樣"],ans:3,exp:"當母體數不大且有完整名冊時，最適合使用簡單隨機抽樣。"},
{ch:3,n:214,stem:"請問以下圖形為何種抽樣方法？圖示說明：母體被分成第 1 層、第 2 層、第 3 層，並且從各層中分別抽出部分樣本。",opts:["系統隨機抽樣","集群抽樣","分層隨機抽樣","立意抽樣"],ans:2,exp:"圖中先把母體分成不同層，再從每一層中抽取樣本，這是分層隨機抽樣。"},
{ch:3,n:215,stem:"請問以下何者為分層隨機抽樣的優點？",opts:["可靠性高","母體不需分類","層級數目不大","以上皆是"],ans:0,exp:"分層隨機抽樣能確保各層都有樣本代表，因此可提高抽樣結果的可靠性。"},
{ch:3,n:216,stem:"以下何者為抽樣的原因？",opts:["經濟考量","時效考量","母體過大","以上皆是"],ans:3,exp:"抽樣可節省成本、縮短時間，也適用於母體過大的情況，因此以上皆是。"},
{ch:3,n:217,stem:"在樣本設計時，樣本不宜太大，也不宜太小，以下何者敘述為是？",opts:["樣本太大是一種浪費","樣本太小會有抽樣誤差的危險","以上皆是","以上皆非"],ans:2,exp:"樣本太大會浪費資源，樣本太小則可能造成估計不穩定與抽樣誤差風險。"},
{ch:3,n:218,stem:"樣本的大小會有哪些影響？",opts:["統計結果的可靠性低","容易導致錯誤的決策","以上皆是","以上皆非"],ans:2,exp:"樣本大小不足時，統計結果可靠性會下降，也可能導致錯誤判斷與決策。"},
{ch:3,n:219,stem:"樣本大小應該考慮的因素？",opts:["可靠性","經濟性","可以容忍的誤差水準","以上皆是"],ans:3,exp:"決定樣本大小時，需同時考量結果可靠性、成本與可接受誤差。"},
{ch:3,n:220,stem:"一個抽樣調查以網路問卷來做調查，這種抽樣方法會漏掉沒有使用網路的人，請問這是屬於哪一種誤差？",opts:["抽樣誤差","非抽樣誤差","以上皆是","以上皆非"],ans:1,exp:"沒有使用網路的人被排除在調查之外，屬於涵蓋不足或調查方式造成的非抽樣誤差。"},
{ch:3,n:221,stem:"下列何種抽樣方法能得到較為可信的民意調查？",opts:["觀眾 call-in","讀者自主寫信回應調查問題","在車站每 5 人取 1 人的調查訪談","簡單隨機抽樣"],ans:3,exp:"簡單隨機抽樣能讓每個成員都有被抽中的機會，通常比自願回覆或便利訪問更可信。"},
{ch:3,n:222,stem:"下列何者為抽樣調查優於普查的不正確敘述？",opts:["抽樣蒐集資料的速度較快","抽樣蒐集資料的成本較低","只要抽到足夠的樣本數，抽樣調查所取得的資料都呈常態分配","在某些狀況下，抽樣的價值僅止於蒐集樣本"],ans:2,exp:"樣本數足夠不代表資料本身一定呈常態分配，因此此敘述不正確。"},
{ch:3,n:223,stem:"就統計推論的合理性而言，下列何種抽樣方法較佳？",opts:["非機率抽樣","簡單隨機抽樣","立意抽樣","配額抽樣"],ans:1,exp:"簡單隨機抽樣屬於機率抽樣，較能支持統計推論。"},
{ch:3,n:224,stem:"就分層抽樣而言，每一個層最好是？",opts:["同質性的","異質性的","都可以","都不可以"],ans:1,exp:"依 PDF 頁尾解答，本題答案為 B。可理解為各層之間最好具有明顯差異，才能發揮分層的效果。"},
{ch:3,n:225,stem:"在母體數量相當龐大的時候，下列哪種抽樣方法最能取得代表性樣本？",opts:["分層抽樣法","系統抽樣法","分段抽樣法","以上皆非"],ans:1,exp:"依固定間隔從龐大母體中抽取樣本，可操作性高，常用於母體數量龐大的情況。"},
{ch:3,n:226,stem:"下列哪個是有關統計上抽樣（sampling）問題不正確的敘述？",opts:["抽樣可以得到更為精確的資料","抽樣可以從事破壞性的實驗調查","抽樣可以操縱代表性的樣本","以上皆非"],ans:0,exp:"抽樣能節省資源並估計母體，但不必然比普查更精確；因此此敘述不正確。"},
{ch:3,n:227,stem:"在百貨公司門口看到有人就上去做問卷，請問這是什麼抽樣方式？",opts:["簡單隨機抽樣","滾雪球抽樣","方便抽樣","系統抽樣"],ans:2,exp:"看到容易接觸的人就進行調查，屬於方便抽樣。"},
{ch:3,n:228,stem:"要了解大專院校學生飲食的看法，北、中、南只抽某區的學校代表，請問這是什麼抽樣方式？",opts:["簡單隨機抽樣","群集抽樣","分層抽樣","系統抽樣"],ans:1,exp:"以區域或學校作為群體單位抽取，再調查該群體代表，屬於群集抽樣的概念。"},
{ch:3,n:229,stem:"一般民意調查抽樣的樣本數為何？",opts:["1000","1067","2000","愈多愈好"],ans:1,exp:"依 PDF 頁尾解答，本題答案為 B。民調常見樣本數約一千多人，用於控制抽樣誤差。"},
{ch:3,n:230,stem:"以下對標準差及標準誤的說明何者為誤？",opts:["標準差是指樣本之間差異的大小","標準差有可能為 0","標準誤是樣本與母體的差異","標準誤有可能為 0"],ans:1,exp:"依 PDF 頁尾解答，本題答案為 B。本講義判定「標準差有可能為 0」為錯誤選項。"},
{ch:3,n:231,stem:"依據研究者的主觀認定，去選取最能適合其研究目的之樣本，稱為？",opts:["立意抽樣","便利抽樣","滾雪球抽樣","以上皆是"],ans:0,exp:"研究者依目的主觀選取適合樣本，稱為立意抽樣。"},
{ch:3,n:232,stem:"下列何者屬非隨機抽樣？",opts:["立意抽樣","便利抽樣","滾雪球抽樣","以上皆是"],ans:3,exp:"立意抽樣、便利抽樣、滾雪球抽樣都屬於非隨機抽樣。"},
{ch:3,n:233,stem:"下列何者屬非隨機抽樣？",opts:["立意抽樣","分層抽樣","集群抽樣","系統抽樣"],ans:0,exp:"立意抽樣由研究者主觀挑選樣本，屬於非隨機抽樣；其餘多屬機率抽樣。"},
{ch:3,n:234,stem:"追蹤 AIDS 病人之行為研究，最適合採何種抽樣？",opts:["立意抽樣","便利抽樣","滾雪球抽樣","以上皆是"],ans:2,exp:"較隱密或難以接觸的族群，常透過受訪者介紹其他對象，適合用滾雪球抽樣。"},
{ch:3,n:235,stem:"從事同性戀研究，最適合採何種抽樣？",opts:["立意抽樣","便利抽樣","滾雪球抽樣","以上皆是"],ans:2,exp:"研究較難直接取得名冊或接觸的族群時，滾雪球抽樣較適合。"},
{ch:3,n:236,stem:"下列何者敘述錯誤？",opts:["預期的實驗處理差異要愈小時，則樣本就要愈小","研究變數的個數愈多，則所需的樣本就要愈大","資料收集的樣本異質性越高，則所需的樣本就要愈大","研究結果之正確性或精確度愈高，則所需的樣本就要愈大"],ans:0,exp:"預期差異越小，越需要較大的樣本才容易偵測出差異，因此 A 說樣本要越小是錯的。"},
{ch:3,n:237,stem:"下列何者非抽樣的優點？",opts:["省時","省成本","提高結果正確性","以上皆是"],ans:2,exp:"抽樣主要優點是省時、省成本；但抽樣不保證提高結果正確性。"},
{ch:3,n:238,stem:"下列何者是造成抽樣誤差之原因？",opts:["樣本數太少","抽樣方法錯誤","運氣不好","以上皆是"],ans:3,exp:"樣本數不足、抽樣方法不當與抽樣偶然性，都可能造成抽樣誤差。"},
{ch:4,n:239,stem:"較常見的統計軟體包括？",opts:["SAS","SPSS","Minitab","以上皆是"],ans:3,exp:"SAS、SPSS、Minitab 都是常見統計軟體，因此選以上皆是。"},
{ch:4,n:240,stem:"SPSS 的英文名稱是？",opts:["Statistics Package for the Social Sciences","Statistical Product and Service Solutions","Statistical Package and Service Solutions","Statistical Product for the Social Solutions"],ans:0,exp:"依原題頁尾答案，SPSS 在本教材採用 Statistics Package for the Social Sciences。"},
{ch:4,n:241,stem:"SAS 的英文名稱是？",opts:["Special Air Service","Statistical Analysis System","Statistical Analysis Solutions","Statistical Analysis Service"],ans:1,exp:"SAS 是 Statistical Analysis System 的縮寫。"},
{ch:4,n:242,stem:"以下何者是資料特性的統計測量數？",opts:["平均數","標準差","偏度與峰度","以上皆是"],ans:3,exp:"平均數描述集中趨勢，標準差描述離散程度，偏度與峰度描述分配型態，都是統計測量數。"},
{ch:4,n:243,stem:"描述資料分散程度的統計測量數，稱為？",opts:["平均數","標準差","中位數","眾數"],ans:1,exp:"標準差用來衡量資料與平均數之間的分散程度。"},
{ch:4,n:244,stem:"標準差的平方為變異數；變異數愈大，代表資料的集中度愈？",opts:["小","大","無關","以上皆可"],ans:0,exp:"變異數愈大表示資料愈分散，因此集中度愈小。"},
{ch:4,n:245,stem:"用來描述資料中央趨勢的統計測量數，稱為？",opts:["平均數","標準差","變異數","全距"],ans:0,exp:"平均數是最常用的中央趨勢測量數。"},
{ch:4,n:246,stem:"如果資料分配不是特別偏態，最可以代表資料中心位置的是？",opts:["平均數","眾數","中位數","以上皆可"],ans:0,exp:"資料未明顯偏態時，平均數通常可代表資料中心。"},
{ch:4,n:247,stem:"一組資料中的最大值減最小值稱做？",opts:["全距","階層","中位數","極值差"],ans:0,exp:"全距等於最大值減最小值。"},
{ch:4,n:248,stem:"有一組資料 10、7、6、6、4、3，全距是？",opts:["7","6","5","4"],ans:0,exp:"最大值 10 減最小值 3，得到全距 7。"},
{ch:4,n:249,stem:"有一組資料 10、7、6、6、4、3，算術平均數是？",opts:["7","6","5","4"],ans:1,exp:"總和為 36，資料筆數 6，36 ÷ 6 = 6。"},
{ch:4,n:250,stem:"有一組資料 10、7、6、6、4、3，中位數是？",opts:["7","6","5","4"],ans:1,exp:"排序後為 3、4、6、6、7、10，中間兩數為 6 與 6，中位數為 6。"},
{ch:4,n:251,stem:"有一組資料 10、7、6、6、4、3，眾數是？",opts:["7","6","5","4"],ans:1,exp:"6 出現 2 次，其他值只出現 1 次，因此眾數是 6。"},
{ch:4,n:252,stem:"當資料有極端值時，哪一種統計測量數最容易受到影響？",opts:["中位數","眾數","平均數","以上皆是"],ans:2,exp:"平均數會把每一筆數值都納入計算，因此最容易受極端值影響。"},
{ch:4,n:253,stem:"在一組資料中，下列敘述何者正確？",opts:["平均數只有一個","中位數可能有許多個","眾數只有一個","以上皆是"],ans:0,exp:"同一組資料的平均數只有一個；眾數可能沒有或有多個。"},
{ch:4,n:254,stem:"在一組資料中，下列敘述何者為是？",opts:["平均數只有一個","中位數只有一個","眾數可能沒有或有多個","以上皆是"],ans:3,exp:"平均數與中位數各有一個，眾數可能沒有或有多個，因此三項皆正確。"},
{ch:4,n:255,stem:"教授因學生考試成績不理想，將學生成績加 20 分，以下敘述何者為非？",opts:["全班平均數增加 20 分","全班中位數增加 20 分","全班眾數的個數不變","全班標準差增加 20 分"],ans:3,exp:"所有分數同加 20 分，集中位置會增加，但資料間距不變，標準差不會增加 20 分。"},
{ch:4,n:256,stem:"教授因學生考試成績不理想，將學生成績增加原有的 10%，以下敘述何者為是？",opts:["全班平均數增加為 1.1 倍","全班中位數增加為 1.1 倍","以上皆是","以上皆非"],ans:2,exp:"每筆資料都乘以 1.1，平均數與中位數也會等比例變為 1.1 倍。"},
{ch:4,n:257,stem:"平均數、中位數、眾數三者都是用來測量資料的中央趨勢，以下敘述何者為是？",opts:["平均數一定優於中位數與眾數","眾數一定優於平均數與中位數","中位數一定優於平均數與眾數","不一定，視資料特性而定"],ans:3,exp:"不同資料型態適合不同中央趨勢指標，不能說某一種一定最好。"},
{ch:4,n:258,stem:"以下敘述何者為是？",opts:["平均數為 0 時，標準差一定等於 0","標準差為 0 時，平均數也一定等於 0","標準差為 0 時，所有資料值皆相同","以上皆是"],ans:2,exp:"標準差為 0 表示所有資料沒有離散，也就是每筆數值都相同。"},
{ch:4,n:259,stem:"有關眾數的敘述何者為是？",opts:["任何一組統計資料，可能有很多眾數","任何一組統計資料，可能沒有眾數","以上皆是","以上皆非"],ans:2,exp:"眾數可能不存在，也可能不只一個。"},
{ch:4,n:260,stem:"當所有資料值均為負數時，以下敘述何者為是？",opts:["平均數有可能為正數","平均數一定為負數","平均數可能為正，也可能為負","以上皆是"],ans:1,exp:"負數資料相加後除以筆數，平均數仍會是負數。"},
{ch:4,n:261,stem:"當所有資料值均為負數時，以下敘述何者為是？",opts:["眾數有可能為正數","眾數一定為負數","眾數可能為正，也可能為負","以上皆是"],ans:1,exp:"若所有觀察值都是負數，出現最多次的值也會是負數。"},
{ch:4,n:262,stem:"當所有資料值均為負數時，以下敘述何者為是？",opts:["中位數有可能為正數","中位數一定為負數","中位數可能為正，也可能為負","以上皆是"],ans:1,exp:"資料排序後中間位置的值仍來自原資料，所以會是負數。"},
{ch:4,n:263,stem:"當所有資料值均為負數時，以下敘述何者為是？",opts:["變異數一定為正數","變異數一定為負數","變異數可能為正，也可能為負","以上皆是"],ans:0,exp:"變異數由離均差平方加總而來，不會是負數；依原題答案選 A。"},
{ch:4,n:264,stem:"資料的分配如果是單峰對稱分配時，則以下敘述何者為是？",opts:["平均數 > 眾數 > 中位數","平均數 < 眾數 < 中位數","平均數 = 眾數 = 中位數","以上都有可能"],ans:2,exp:"單峰且對稱的分配中，平均數、中位數、眾數會重合。"},
{ch:4,n:265,stem:"母體之標準差即為母體的？",opts:["參數","標準誤","統計量","變異數"],ans:0,exp:"母體特徵值稱為參數。"},
{ch:4,n:266,stem:"母體之平均數即為母體的？",opts:["參數","標準誤","統計量","變異數"],ans:0,exp:"母體平均數是描述母體的數值，因此是參數。"},
{ch:4,n:267,stem:"抽查全省四家商店的飲料售價為 20、22、21、17 元，下列何者屬於敘述統計學？",opts:["這四家商店所售飲料的平均售價為 20 元","全省所有商店所售飲料的平均售價為 20 元","全省有一半商店售價高於 20 元","以上皆是"],ans:0,exp:"敘述統計只描述已觀察到的樣本資料，不推論到全省所有商店。"},
{ch:4,n:268,stem:"若某組資料之標準差為 0，則下列敘述何者為真？",opts:["資料分配成對稱","平均數大於中位數","資料中所有觀察值都相同","資料中觀察值正負各半"],ans:2,exp:"標準差為 0 表示完全沒有離散，所有觀察值相同。"},
{ch:4,n:269,stem:"觀測資料為 1、3、5、5、5、7、9，下列何者正確？",opts:["平均數 = 中位數","中位數 = 眾數","平均數 = 眾數","以上皆是"],ans:3,exp:"平均數、中位數、眾數皆為 5。"},
{ch:4,n:270,stem:"四群學生人數為 10、20、30、40 人，平均體重分別為 50、55、60、65 公斤，全部學生平均體重約為？",opts:["55","57","60","資料不足，不能計算"],ans:2,exp:"加權平均 = (10x50+20x55+30x60+40x65)/100 = 60。"},
{ch:4,n:271,stem:"何種測量離散程度的度量最易受到極端值的影響？",opts:["中位數","四分位距","變異數","全距"],ans:3,exp:"全距只看最大值與最小值，因此最容易受極端值影響。"},
{ch:4,n:272,stem:"一組樣本觀察值為 3、5、7、5、6、7，樣本眾數為？",opts:["5","5.5","7","5 與 7"],ans:3,exp:"5 與 7 都出現兩次，並列為眾數。"},
{ch:4,n:273,stem:"資料 13、12、7、16、12、15、9、13、7、16 的中位數與平均數為？",opts:["12.5、12","12、12.5","10、12","12、10"],ans:0,exp:"排序後中間兩數為 12、13，中位數 12.5；總和 120，平均數 12。"},
{ch:4,n:274,stem:"7 筆資料 2、3、5、1、1、1、8，中位數為？",opts:["3","1","2","7"],ans:2,exp:"排序後為 1、1、1、2、3、5、8，第 4 個值為 2。"},
{ch:4,n:275,stem:"7 筆資料 2、3、5、1、1、1、8，平均數為？",opts:["3","1","2","7"],ans:0,exp:"總和 21，21 ÷ 7 = 3。"},
{ch:4,n:276,stem:"7 筆資料 2、3、5、1、1、1、8，眾數為？",opts:["3","1","2","7"],ans:1,exp:"1 出現 3 次，是出現次數最多的數值。"},
{ch:4,n:277,stem:"7 筆資料 2、3、5、1、1、1、8，全距為？",opts:["3","1","2","7"],ans:3,exp:"最大值 8 減最小值 1，得到全距 7。"},
{ch:4,n:278,stem:"常態分配又稱為？",opts:["圓形分配","鐘形分配","三角分配","椎型分配"],ans:1,exp:"常態分配的外形像鐘，因此稱為鐘形分配。"},
{ch:4,n:279,stem:"常態分配下，平均數加減一個標準差約占多少百分比？",opts:["68%","95%","99%","100%"],ans:0,exp:"常態分配的 68-95-99.7 規則中，平均數正負 1 個標準差約涵蓋 68%。"},
{ch:4,n:280,stem:"下列何者不是算術平均數的特性？",opts:["位於中央位置的資料值","是整個資料的平衡點","與資料差異的總和為 0","與資料差異的平方和是最小的"],ans:0,exp:"位於中央位置的是中位數的概念，不是平均數的定義。"},
{ch:4,n:281,stem:"如果 p 值大於顯著水準值，我們如何下統計決定？",opts:["不拒絕虛無假設","拒絕虛無假設","不做任何統計決定","以上皆是"],ans:0,exp:"p 值大於顯著水準表示證據不足，因此不拒絕虛無假設。"},
{ch:4,n:282,stem:"告知朋友「我 20-30 分鐘到」，這是屬於？",opts:["右尾估計","左尾估計","區間估計","無法估計"],ans:2,exp:"20 到 30 分鐘是一段範圍，因此是區間估計。"},
{ch:4,n:283,stem:"告知朋友「我至少還要 30 分鐘才到」，這是屬於？",opts:["右尾估計","左尾估計","雙尾估計","無法估計"],ans:0,exp:"至少 30 分鐘表示時間大於等於某值，屬於右尾方向。"},
{ch:4,n:284,stem:"告知朋友「我 10 分鐘內到」，這是屬於？",opts:["右尾估計","左尾估計","雙尾估計","無法估計"],ans:1,exp:"10 分鐘內表示時間小於等於某值，屬於左尾方向。"},
{ch:4,n:285,stem:"老師問考幾分，學生回答「80 分」，這是？",opts:["右尾估計","左尾估計","雙尾估計","點估計"],ans:3,exp:"只給出單一數值，屬於點估計。"},
{ch:4,n:286,stem:"老師問考幾分，學生回答「考不到 60 分」，這是？",opts:["右尾估計","左尾估計","區間估計","點估計"],ans:1,exp:"不到 60 分表示小於某界線，屬左尾估計。"},
{ch:4,n:287,stem:"老師問考幾分，學生回答「80-90 分之間」，這是？",opts:["右尾估計","左尾估計","區間估計","點估計"],ans:2,exp:"80 到 90 分是一段區間。"},
{ch:4,n:288,stem:"老師問考幾分，學生回答「至少 70 分」，這是？",opts:["右尾估計","左尾估計","區間估計","點估計"],ans:0,exp:"至少 70 分表示分數大於等於 70，屬右尾估計。"},
{ch:4,n:289,stem:"在民意調查中，要了解候選人的得票率，應使用何種方法？",opts:["交叉分析","次數分配表","相關分析","複選題分析"],ans:1,exp:"得票率屬單一變項的比例分布，適合用次數分配表。"},
{ch:4,n:290,stem:"在民意調查中，要了解候選人在不同政黨中的得票率，應使用何種方法？",opts:["交叉分析","次數分配表","相關分析","複選題分析"],ans:0,exp:"同時比較政黨與得票率，屬兩個類別變項的交叉分析。"},
{ch:4,n:291,stem:"抽樣調查中，要了解樣本的性別、教育程度、職業及宗教信仰等特徵，應如何分析？",opts:["交叉分析","次數分配表","相關分析","複選題分析"],ans:1,exp:"這些是類別變項，先看各類別人數與比例即可。"},
{ch:4,n:292,stem:"抽樣調查中，要了解樣本的年齡、所得及每月消費金額等特徵，應如何分析？",opts:["交叉分析","次數分配表","相關分析","敘述性統計分析"],ans:3,exp:"年齡、所得與消費金額多為數值資料，適合用平均數、標準差等敘述統計。"},
{ch:4,n:293,stem:"想了解住宿男同學與女同學在考試成績上有沒有不同，何者最適當？",opts:["迴歸分析","T 檢定","交叉分析","相關分析"],ans:1,exp:"兩組平均成績比較，適合使用 T 檢定。"},
{ch:4,n:294,stem:"想了解大一到大四同學對老師教學態度的看法是否不同，何者最適當？",opts:["迴歸分析","T 檢定","變異數分析","相關分析"],ans:2,exp:"比較三組以上的平均差異，適合使用 ANOVA 變異數分析。"},
{ch:4,n:295,stem:"想了解男女同學對於在校期間應不應該打工的看法百分比有無不同，何者最適當？",opts:["迴歸分析","T 檢定","交叉分析","相關分析"],ans:2,exp:"性別與看法皆為類別變項，適合交叉分析。"},
{ch:4,n:296,stem:"要看一組題目是否能有效區別受測者差異，以下何者最適當？",opts:["迴歸分析","T 檢定","區別分析","鑑別力分析"],ans:3,exp:"題目能否區分高低能力受測者，屬鑑別力分析。"},
{ch:4,n:297,stem:"以下哪件事需要估計或猜測？",opts:["明天太陽會從東方升起","下課後要回宿舍睡覺","天氣熱了，一起去游泳","明天會不會下雨"],ans:3,exp:"未來天氣具有不確定性，需要估計。"},
{ch:4,n:298,stem:"想了解廣告費每花 10 萬元會增加多少產品銷售量，何者最適當？",opts:["迴歸分析","T 檢定","變異數分析","相關分析"],ans:0,exp:"要預測投入廣告費對銷售量的影響量，適合迴歸分析。"},
{ch:4,n:299,stem:"相關係數 r 的性質以下何者為非？",opts:["-1 <= r <= 1","r = 0 為無相關","r = 1 為完全正相關","0 <= r <= 1"],ans:3,exp:"相關係數可為負值，因此範圍不是只有 0 到 1。"},
{ch:4,n:300,stem:"相關程度 r 的大小，以下敘述何者為非？",opts:["r = 1 表示完全正相關","r = -1 表示完全負相關","0.7 <= |r| < 1 表示高度相關","0.3 <= |r| < 0.7 表示低度相關"],ans:3,exp:"0.3 到 0.7 通常不是低度相關，依教材答案此敘述為非。"},
{ch:4,n:301,stem:"某班 20 位學生數學成績 x 與英文成績 y 的迴歸式為 y = 44 + 0.4x。若數學 60 分，英文預測為？",opts:["24 分","44 分","68 分","60 分"],ans:2,exp:"代入 x=60，y=44+0.4x60=68。"},
{ch:4,n:302,stem:"以下敘述何者為真？",opts:["平均數易受到極端值影響","資料有極端值時應以中位數為主","一般有母數分析時，應將極端值刪除","以上皆是"],ans:3,exp:"依教材答案三項皆列為正確。平均數會受極端值影響，有極端值時中位數較穩健。"},
{ch:4,n:303,stem:"以下何者不是類別變項應該報告的數值？",opts:["平均數","中位數","標準差","以上皆是"],ans:3,exp:"類別變項通常報告次數與百分比，不適合報告平均數、中位數、標準差。"},
{ch:4,n:304,stem:"甲、乙兩班數學成績平均數一樣，但甲班標準差大於乙班，表示？",opts:["甲班同學比較認真","乙班同學程度較平均","甲班同學程度較平均","沒有意思"],ans:1,exp:"標準差較小代表成績分散較小，程度較平均。"},
{ch:4,n:305,stem:"想了解性別與觀看電影類型是否有相關，以下何者可以使用？",opts:["t 檢定","交叉表","ANOVA","以上皆非"],ans:1,exp:"性別與電影類型皆為類別變項，適合用交叉表。"},
{ch:4,n:306,stem:"檢定甲、乙兩班期中考數學成績是否有差異，可使用 t 檢定；若結果顯著 p<0.05，表示？",opts:["甲班成績比乙班高","乙班成績比甲班高","兩班數學成績有差異","以上皆非"],ans:2,exp:"p<0.05 表示兩班平均成績有顯著差異，但方向需看平均數。"},
{ch:4,n:307,stem:"甲班平均 75 分、乙班平均 65 分，若 t 檢定結果顯著 p<0.05，表示？",opts:["甲班數學程度比乙班高","乙班數學程度比甲班高","兩班數學程度沒有差別","無法判斷"],ans:0,exp:"甲班平均較高且差異顯著，因此可判斷甲班較高。"},
{ch:4,n:308,stem:"甲班平均 75 分、乙班平均 65 分，若 t 檢定結果不顯著 p>0.05，表示？",opts:["甲班數學程度比乙班高","乙班數學程度比甲班高","兩班數學程度沒有差別","無法判斷"],ans:2,exp:"不顯著表示統計上未能證明兩班有差異。"},
{ch:4,n:309,stem:"一群人參加減重班，經過一個月後，醫生想知道減重是否有效果，何者適當？",opts:["獨立 t 檢定","paired t 檢定","平均數檢定","以上皆非"],ans:1,exp:"同一群人前後比較，屬配對樣本，使用 paired t 檢定。"},
{ch:4,n:310,stem:"醫生想比較三種高血壓藥物何者較有效，將 60 位患者分三組服用不同藥物，何者適合？",opts:["迴歸分析","變異數分析","獨立樣本 t 檢定","相關分析"],ans:1,exp:"三組以上平均效果比較，適合變異數分析。"},
{ch:4,n:311,stem:"企業想了解廣告費用、價格對銷售量的影響，何者較適當？",opts:["迴歸分析","變異數分析","獨立樣本 t 檢定","相關分析"],ans:0,exp:"用多個自變數解釋或預測銷售量，屬迴歸分析。"},
{ch:4,n:312,stem:"想了解美國股市與台灣股市股價的連動性，何種方法較適當？",opts:["迴歸分析","變異數分析","獨立樣本 t 檢定","相關分析"],ans:3,exp:"連動性主要看兩變數相關程度，適合相關分析。"},
{ch:4,n:313,stem:"企業想了解北區、中區及南區產品銷售量是否不同，何者較適當？",opts:["迴歸分析","變異數分析","獨立樣本 t 檢定","相關分析"],ans:1,exp:"比較三個區域的平均銷售量，適合 ANOVA。"},
{ch:4,n:314,stem:"若認為父母身高會影響小孩身高，何種方法較適當？",opts:["迴歸分析","變異數分析","獨立樣本 t 檢定","相關分析"],ans:0,exp:"探討父母身高對小孩身高的影響與預測，屬迴歸分析。"},
{ch:4,n:315,stem:"若認為長相好壞與薪水高低有關係，何種方法較適當？",opts:["迴歸分析","變異數分析","獨立樣本 t 檢定","相關分析"],ans:3,exp:"探討兩變數是否有關聯，適合相關分析。"},
{ch:4,n:316,stem:"7-11 送貨先規劃路徑，使到每一家 7-11 距離最近，使用何種估計方法？",opts:["最小平方法","最大概似法","貝氏估計法","以上皆非"],ans:0,exp:"以距離最小化為目標，符合最小平方法的概念。"},
{ch:4,n:317,stem:"醫生看病時先詢問症狀，再判斷最可能的病，使用何種估計方法？",opts:["最小平方法","最大概似法","貝氏估計法","以上皆非"],ans:1,exp:"根據症狀判斷最可能疾病，符合最大概似法。"},
{ch:4,n:318,stem:"下列哪種圖形是屬性（類別）資料可畫的圖形？",opts:["直方圖","圓形圖","長條圖","散佈圖"],ans:2,exp:"類別資料適合用長條圖呈現各類別次數或比例。"},
{ch:4,n:319,stem:"汽車公司想比較去年與今年輕型卡車及轎車銷售數目，何種圖形最恰當？",opts:["兩直方圖","兩長條圖","直方圖","圓餅圖"],ans:1,exp:"年份與車種為類別比較，適合用長條圖呈現。"},
{ch:4,n:320,stem:"下列何者不是莖葉圖的優點？",opts:["提供原始數值及其取得條件","較容易製作，數值遺漏或重複時可補足或刪除","便利閱讀","容易讀出各分組的百分比"],ans:3,exp:"莖葉圖主要保留原始資料與分布，不是用來直接顯示百分比。"},
{ch:4,n:321,stem:"下列何者不是長條圖的特性？",opts:["長條依長度區別，與寬度無關","長條間應留空隙，勿連接在一起","長條依變數特性順序排列，利於分析並求美觀","各長條間連接在一起，以求美觀"],ans:3,exp:"長條圖的長條之間通常應留空隙，連在一起是直方圖特徵。"},
{ch:4,n:322,stem:"要將累積次數用圖表示，下列何種圖形最恰當？",opts:["累積多邊形圖","圓餅圖","直方圖","次數多邊形圖"],ans:0,exp:"累積次數通常用累積次數多邊形圖表示。"},
{ch:4,n:323,stem:"以下何者不是圓餅圖所提供的資訊？",opts:["相對百分比","資料標籤","數量大小","厚度"],ans:3,exp:"圓餅圖表示比例或百分比，厚度不是必要資訊。"},
{ch:4,n:324,stem:"信義房屋想知道南部五家分店裡各業務員的銷售能力，何種圖形較適當？",opts:["圓餅圖","群組直條圖","堆疊直條圖","折線圖"],ans:1,exp:"要比較各分店與各業務員，群組直條圖較容易看出差異。"},
{ch:4,n:325,stem:"信義房屋想知道各分店銷售總額及業務員銷售能力，何種圖形較適當？",opts:["圓餅圖","群組直條圖","堆疊直條圖","折線圖"],ans:2,exp:"堆疊直條圖可同時看整體總額與各組成部分。"},
{ch:4,n:326,stem:"把同學期中考成績製成圖表，以 20 分為一組，何種圖形較適當？",opts:["直方圖","圓餅圖","堆疊區域圖","群組直條圖"],ans:0,exp:"連續數值資料分組後，適合用直方圖呈現分布。"},
{ch:4,n:327,stem:"想知道台灣過去十年經濟成長趨勢，何種圖形較適當？",opts:["直方圖","圓餅圖","累加次數直方圖","XY 圖"],ans:3,exp:"時間趨勢適合用折線或 XY 圖呈現變化。"},
{ch:4,n:328,stem:"想知道班上統計成績分配，且想知道每個同學的成績，何種圖形較適當？",opts:["莖葉圖","直方圖","百分比長條圖","折線圖"],ans:0,exp:"莖葉圖可呈現分布，也能保留個別原始數值。"},
{ch:4,n:329,stem:"次數分配表適合用以下何種圖形顯示？",opts:["長條圖","圓餅圖","直方圖","以上皆是"],ans:3,exp:"依資料型態不同，次數分配可用長條圖、圓餅圖或直方圖呈現。"},
{ch:4,n:330,stem:"以下何種圖形可以用來檢查資料是否具有極端值？",opts:["長條圖","盒鬚圖","莖葉圖","以上皆可"],ans:1,exp:"盒鬚圖能清楚標示離群值與分散情形。"},
{ch:4,n:331,stem:"以下何種圖形可以用來檢查資料是否符合常態？",opts:["長條圖","盒鬚圖","直方圖","以上皆是"],ans:3,exp:"圖形可從不同角度輔助檢查分布型態，依教材答案選以上皆是。"},
{ch:4,n:332,stem:"最普遍用來呈現分析資料的方式是？",opts:["文字","表格","圖形","以上皆非"],ans:1,exp:"統計結果常以表格整理，便於比較與查閱。"},
{ch:4,n:333,stem:"以下何者是一個表格需要呈現的部分？",opts:["標題","資料來源","各欄的標題","以上皆是"],ans:3,exp:"表格需有標題、資料來源與欄位標題，才完整清楚。"},
{ch:4,n:334,stem:"最容易閱讀的資料呈現是？",opts:["文字","表格","圖形","以上皆非"],ans:2,exp:"圖形通常能讓讀者快速掌握趨勢與比較結果。"},
{ch:4,n:335,stem:"圖的標題應置放在圖的哪一個位置？",opts:["圖的上方","圖的下方","都可以"],ans:0,exp:"依本教材規定，圖標題置於圖上方。"},
{ch:4,n:336,stem:"表的標題應置放在表的哪一個位置？",opts:["表的上方","表的下方","都可以"],ans:0,exp:"依本教材規定，表標題置於表上方。"},
{ch:4,n:337,stem:"何種圖形包括數個連續且彼此間沒有空隙的矩形，每個矩形代表一個類別？",opts:["直方圖","長條圖","多邊圖","以上皆非"],ans:0,exp:"直方圖的矩形相鄰且無空隙，用來呈現分組資料。"},
{ch:4,n:338,stem:"直方圖中的矩形高度可能代表？",opts:["絕對次數","百分比例","以上皆可","以上皆非"],ans:2,exp:"直方圖高度可表示次數，也可表示相對頻率或百分比。"},
{ch:4,n:339,stem:"長條圖中，變項的分類通常放在？",opts:["X 軸","Y 軸","都可以"],ans:2,exp:"分類可以依設計放在水平或垂直軸，常見兩種方向。"},
{ch:4,n:340,stem:"長條圖中，受試者數目或百分比應放在？",opts:["X 軸","Y 軸","都可以"],ans:2,exp:"人數或百分比可以依直式或橫式長條圖放在不同軸上。"},

// 章節(篇)設定
const CHAPTERS = {
  1: { name: "研究方法與研究計畫", range: "第 1-77 題" },
  2: { name: "資料蒐集的工具",     range: "第 78-192 題" },
  3: { name: "抽樣與樣本調查",     range: "第 193-238 題" },
  4: { name: "資料分析與報告的撰寫", range: "第 239-360 題" }
};
const CHAPTER_LIST = [1, 2, 3, 4];

const LETTERS = ["A", "B", "C", "D"];
const STORAGE_KEY = "stat_quiz_v1";

let state = { mode: null, queue: [], idx: 0, answered: false };
let progress = loadProgress();

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (!p.history) p.history = {};
      if (!p.wrongIds) p.wrongIds = [];
      if (typeof p.totalAnswered !== 'number') p.totalAnswered = 0;
      if (typeof p.totalCorrect !== 'number') p.totalCorrect = 0;
      return p;
    }
  } catch (e) {}
  return { history: {}, wrongIds: [], totalAnswered: 0, totalCorrect: 0 };
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) {}
}
// 題號全域唯一 (1-360)，直接以題號為 id
function qid(q) { return String(q.n); }
function chapterName(q) { return CHAPTERS[q.ch] ? CHAPTERS[q.ch].name : ("第 " + q.ch + " 篇"); }

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function renderHome() {
  const total = QUESTIONS.length;
  const answered = progress.totalAnswered;
  const correct = progress.totalCorrect;
  const acc = answered > 0 ? Math.round(correct / answered * 100) : 0;
  const wrongCount = progress.wrongIds.length;

  let html = '<h1>\uD83D\uDCCA \u7D71\u8A08\u5B78\u5237\u984C</h1>';

  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-label">\u7E3D\u984C\u6578</div><div class="stat-num">' + total + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u5DF2\u4F5C\u7B54</div><div class="stat-num">' + answered + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u6B63\u78BA\u7387</div><div class="stat-num">' + acc + '%</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u932F\u984C\u6578</div><div class="stat-num">' + wrongCount + '</div></div>';
  html += '</div>';

  // \u641C\u5C0B\u6846
  html += '<div class="search-wrap">';
  html += '<input type="search" id="search-input" class="search-input" placeholder="\uD83D\uDD0D \u641C\u5C0B\u984C\u76EE\u95DC\u9375\u5B57..." autocomplete="off">';
  html += '<div id="search-results"></div>';
  html += '</div>';

  html += '<h2>\u9078\u64C7\u6A21\u5F0F</h2>';
  html += '<div class="mode-card" data-mode="chapter"><div class="mode-title">\uD83D\uDCD6 \u4F9D\u7BC7\u7AE0\u7DF4\u7FD2</div><div class="mode-desc">\u6311\u9078\u4E00\u7BC7\u4F9D\u5E8F\u7DF4\u7FD2</div></div>';
  html += '<div class="mode-card" data-mode="browse"><div class="mode-title">\uD83D\uDCCB \u700F\u89BD\u984C\u76EE</div><div class="mode-desc">\u4F9D\u7AE0\u7BC0\u9EDE\u9032\u53BB\uFF0C\u76F4\u63A5\u770B\u984C\u76EE\u3001\u7B54\u6848\u8207\u89E3\u6790\uFF08\u542B\u5716\u8868\uFF09</div></div>';

  const savedCount = parseInt(localStorage.getItem('stat_random_count') || '30');
  html += '<div class="mode-card-static"><div class="mode-title">\uD83C\uDFB2 \u96A8\u6A5F\u62BD\u984C</div>';
  html += '<div class="mode-desc">\u5F9E\u5168\u90E8 ' + total + ' \u984C\u96A8\u6A5F\u6D17\u724C\u51FA\u984C</div>';
  html += '<div class="count-row">';
  html += '<span class="count-label">\u984C\u6578</span>';
  html += '<div class="count-pills" id="count-pills">';
  [10, 20, 30, 50, total].forEach(function (n) {
    const label = n === total ? '\u5168\u90E8' : n;
    html += '<button class="count-pill ' + (n === savedCount ? 'active' : '') + '" data-count="' + n + '">' + label + '</button>';
  });
  html += '</div></div>';
  html += '<button class="btn-primary" id="start-random" style="margin-top: 12px;">\u958B\u59CB</button>';
  html += '</div>';

  html += '<div class="mode-card ' + (wrongCount === 0 ? 'disabled' : '') + '" data-mode="wrong">';
  html += '<div class="mode-title">\u274C \u932F\u984C\u8907\u7FD2' + (wrongCount > 0 ? ' (' + wrongCount + ')' : '') + '</div>';
  html += '<div class="mode-desc">' + (wrongCount > 0 ? '\u53EA\u770B\u4F60\u7B54\u932F\u904E\u7684\u984C\u76EE' : '\u76EE\u524D\u9084\u6C92\u6709\u932F\u984C') + '</div></div>';

  if (answered > 0) {
    html += '<button id="reset-btn" class="btn-secondary">\u6E05\u9664\u4F5C\u7B54\u7D00\u9304</button>';
  }

  document.getElementById('app').innerHTML = html;

  document.querySelectorAll('.mode-card').forEach(function (el) {
    el.addEventListener('click', function () {
      const mode = el.dataset.mode;
      if (mode === 'wrong' && wrongCount === 0) return;
      if (mode === 'chapter') renderChapterPicker();
      else if (mode === 'browse') renderBrowseChapters();
      else if (mode === 'wrong') {
        const wrongQs = QUESTIONS.filter(function (q) { return progress.wrongIds.indexOf(qid(q)) !== -1; });
        startQuiz('wrong', shuffle(wrongQs));
      }
    });
  });

  document.querySelectorAll('#count-pills .count-pill').forEach(function (pill) {
    pill.addEventListener('click', function () {
      document.querySelectorAll('#count-pills .count-pill').forEach(function (p) { p.classList.remove('active'); });
      pill.classList.add('active');
      localStorage.setItem('stat_random_count', pill.dataset.count);
    });
  });

  const startRandomBtn = document.getElementById('start-random');
  if (startRandomBtn) {
    startRandomBtn.addEventListener('click', function () {
      const activePill = document.querySelector('#count-pills .count-pill.active');
      const count = activePill ? parseInt(activePill.dataset.count) : 30;
      const picked = shuffle(QUESTIONS).slice(0, count);
      startQuiz('random', picked);
    });
  }

  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) {
    resetBtn.addEventListener('click', function () {
      if (confirm('\u78BA\u5B9A\u8981\u6E05\u9664\u6240\u6709\u4F5C\u7B54\u7D00\u9304\u55CE\uFF1F')) {
        progress = { history: {}, wrongIds: [], totalAnswered: 0, totalCorrect: 0 };
        saveProgress();
        renderHome();
      }
    });
  }

  // \u641C\u5C0B\u529F\u80FD
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  if (searchInput) {
    searchInput.addEventListener('input', function () {
      const kw = searchInput.value.trim().toLowerCase();
      if (kw === '') {
        searchResults.innerHTML = '';
        searchResults.style.display = 'none';
        return;
      }
      const matches = QUESTIONS.filter(function (q) {
        const hay = (q.n + ' ' + q.stem + ' ' + q.opts.join(' ') + ' ' + q.exp).toLowerCase();
        return hay.indexOf(kw) !== -1;
      });
      if (matches.length === 0) {
        searchResults.innerHTML = '<div class="search-empty">\u627E\u4E0D\u5230\u7B26\u5408\u300C' + escapeHtml(kw) + '\u300D\u7684\u984C\u76EE</div>';
        searchResults.style.display = 'block';
        return;
      }
      let resHtml = '<div class="search-count">\u627E\u5230 ' + matches.length + ' \u984C</div>';
      matches.slice(0, 50).forEach(function (q) {
        const preview = q.stem.length > 60 ? q.stem.slice(0, 60) + '...' : q.stem;
        const previewClean = preview.replace(/\n/g, ' ');
        resHtml += '<div class="search-item" data-id="' + qid(q) + '">';
        resHtml += '<div class="search-item-meta">\u7B2C ' + q.ch + ' \u7BC7 \u00B7 \u7B2C ' + q.n + ' \u984C</div>';
        resHtml += '<div class="search-item-stem">' + highlightKeyword(previewClean, kw) + '</div>';
        resHtml += '</div>';
      });
      if (matches.length > 50) {
        resHtml += '<div class="search-empty">\u50C5\u986F\u793A\u524D 50 \u984C\uFF0C\u8ACB\u8F38\u5165\u66F4\u7CBE\u78BA\u7684\u95DC\u9375\u5B57</div>';
      }
      searchResults.innerHTML = resHtml;
      searchResults.style.display = 'block';

      document.querySelectorAll('.search-item').forEach(function (item) {
        item.addEventListener('click', function () {
          const id = item.dataset.id;
          const q = QUESTIONS.find(function (x) { return qid(x) === id; });
          if (q) renderPreview(q);
        });
      });
    });
  }
}

function highlightKeyword(text, kw) {
  const escaped = escapeHtml(text);
  if (!kw) return escaped;
  const escKw = escapeHtml(kw);
  const regex = new RegExp(escKw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return escaped.replace(regex, function (m) { return '<mark>' + m + '</mark>'; });
}

function renderPreview(q, back) {
  const status = progress.history[qid(q)];
  let statusBadge = '';
  if (status === 'correct') statusBadge = '<span class="badge badge-ok">\u5DF2\u7B54\u5C0D</span>';
  else if (status === 'wrong') statusBadge = '<span class="badge badge-no">\u66FE\u7B54\u932F</span>';

  let optsHtml = '';
  for (let i = 0; i < q.opts.length; i++) {
    const isAns = i === q.ans;
    optsHtml += '<div class="opt ' + (isAns ? 'correct' : '') + '" style="cursor: default;">';
    optsHtml += '<span class="opt-key">' + LETTERS[i] + '.</span>' + escapeHtml(q.opts[i]);
    optsHtml += '</div>';
  }

  const backLabel = back ? '\u2190 \u8FD4\u56DE\u6E05\u55AE' : '\u2190 \u8FD4\u56DE\u9996\u9801';
  let html = '<button id="back-btn" class="btn-back">' + backLabel + '</button>';
  html += '<div class="meta-row"><span>\u7B2C ' + q.ch + ' \u7BC7 \u00B7 \u7B2C ' + q.n + ' \u984C \u00B7 ' + chapterName(q) + '</span>' + statusBadge + '</div>';
  html += '<div class="q-card">';
  html += '<div class="q-stem">' + escapeHtml(q.stem).replace(/\n/g, '<br>') + '</div>';
  if (q.fig) html += q.fig;
  html += '<div>' + optsHtml + '</div>';
  html += '<div class="explain"><b>\u6B63\u78BA\u7B54\u6848\uFF1A' + LETTERS[q.ans] + '</b>';
  html += escapeHtml(q.exp).replace(/\n/g, '<br>');
  html += '</div>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', back || renderHome);
  window.scrollTo(0, 0);
}

// ---- 瀏覽題目：選章節 ----
function renderBrowseChapters() {
  let html = '<button id="back-btn" class="btn-back">\u2190 \u8FD4\u56DE</button>';
  html += '<h1>\uD83D\uDCCB \u700F\u89BD\u984C\u76EE</h1>';
  CHAPTER_LIST.forEach(function (ch) {
    const chQs = QUESTIONS.filter(function (q) { return q.ch === ch; });
    html += '<div class="mode-card" data-ch="' + ch + '">';
    html += '<div class="mode-title">\u7B2C ' + ch + ' \u7BC7 \u00B7 ' + CHAPTERS[ch].name + '</div>';
    html += '<div class="mode-desc">' + CHAPTERS[ch].range + ' \u00B7 ' + chQs.length + ' \u984C</div>';
    html += '</div>';
  });
  document.getElementById('app').innerHTML = html;

  document.getElementById('back-btn').addEventListener('click', renderHome);
  document.querySelectorAll('.mode-card').forEach(function (el) {
    el.addEventListener('click', function () {
      renderBrowseList(parseInt(el.dataset.ch));
    });
  });
  window.scrollTo(0, 0);
}

// ---- 瀏覽題目：某一章的題目清單 ----
function renderBrowseList(ch) {
  const chQs = QUESTIONS.filter(function (q) { return q.ch === ch; });
  let html = '<button id="back-btn" class="btn-back">\u2190 \u8FD4\u56DE\u7BC7\u7AE0</button>';
  html += '<div class="meta-row"><span>\u7B2C ' + ch + ' \u7BC7 \u00B7 ' + CHAPTERS[ch].name + '</span><span>\u5171 ' + chQs.length + ' \u984C</span></div>';
  chQs.forEach(function (q) {
    const st = progress.history[qid(q)];
    let badge = '';
    if (st === 'correct') badge = '<span class="badge badge-ok">\u7B54\u5C0D</span>';
    else if (st === 'wrong') badge = '<span class="badge badge-no">\u7B54\u932F</span>';
    const stem = q.stem.replace(/\n/g, ' ');
    const preview = stem.length > 50 ? stem.slice(0, 50) + '...' : stem;
    const figTag = q.fig ? ' \u00B7 \uD83D\uDCC8\u542B\u5716' : '';
    html += '<div class="search-item" data-id="' + qid(q) + '">';
    html += '<div class="search-item-meta">\u7B2C ' + q.n + ' \u984C' + figTag + (badge ? ' \u00B7 ' : '') + badge + '</div>';
    html += '<div class="search-item-stem">' + escapeHtml(preview) + '</div>';
    html += '</div>';
  });
  document.getElementById('app').innerHTML = html;

  document.getElementById('back-btn').addEventListener('click', renderBrowseChapters);
  document.querySelectorAll('.search-item').forEach(function (item) {
    item.addEventListener('click', function () {
      const q = QUESTIONS.find(function (x) { return qid(x) === item.dataset.id; });
      if (q) renderPreview(q, function () { renderBrowseList(ch); });
    });
  });
  window.scrollTo(0, 0);
}

function renderChapterPicker() {
  let html = '<button id="back-btn" class="btn-back">\u2190 \u8FD4\u56DE</button>';
  html += '<h1>\u9078\u64C7\u7BC7\u7AE0</h1>';
  CHAPTER_LIST.forEach(function (ch) {
    const chQs = QUESTIONS.filter(function (q) { return q.ch === ch; });
    const answered = chQs.filter(function (q) { return progress.history[qid(q)]; }).length;
    const correct = chQs.filter(function (q) { return progress.history[qid(q)] === 'correct'; }).length;
    html += '<div class="mode-card" data-ch="' + ch + '">';
    html += '<div class="mode-title">\u7B2C ' + ch + ' \u7BC7 \u00B7 ' + CHAPTERS[ch].name + '</div>';
    html += '<div class="mode-desc">' + CHAPTERS[ch].range + ' \u00B7 ' + chQs.length + ' \u984C \u00B7 \u5DF2\u505A ' + answered + '/' + chQs.length + ' \u00B7 \u6B63\u78BA ' + correct + '</div>';
    html += '</div>';
  });
  document.getElementById('app').innerHTML = html;

  document.getElementById('back-btn').addEventListener('click', renderHome);
  document.querySelectorAll('.mode-card').forEach(function (el) {
    el.addEventListener('click', function () {
      const ch = parseInt(el.dataset.ch);
      const chQs = QUESTIONS.filter(function (q) { return q.ch === ch; });
      startQuiz('chapter-' + ch, chQs);
    });
  });
}

function startQuiz(mode, queue) {
  if (queue.length === 0) return;
  state = { mode: mode, queue: queue, idx: 0, answered: false };
  renderQuestion();
}

function renderQuestion() {
  const q = state.queue[state.idx];
  const total = state.queue.length;
  const progPct = Math.round(state.idx / total * 100);

  let modeLabel = '';
  if (state.mode === 'random') modeLabel = '\u96A8\u6A5F\u62BD\u984C';
  else if (state.mode === 'wrong') modeLabel = '\u932F\u984C\u8907\u7FD2';
  else if (state.mode.indexOf('chapter-') === 0) modeLabel = '\u7B2C ' + q.ch + ' \u7BC7';

  let optsHtml = '';
  for (let i = 0; i < q.opts.length; i++) {
    optsHtml += '<button class="opt" data-idx="' + i + '">';
    optsHtml += '<span class="opt-key">' + LETTERS[i] + '.</span>' + escapeHtml(q.opts[i]);
    optsHtml += '</button>';
  }

  let html = '<button id="back-btn" class="btn-back">\u2190 \u8FD4\u56DE\u9996\u9801</button>';
  html += '<div class="meta-row"><span>' + modeLabel + ' \u00B7 \u7B2C ' + (state.idx + 1) + ' / ' + total + ' \u984C</span><span>\u7B2C ' + q.ch + ' \u7BC7 \u00B7 \u7B2C ' + q.n + ' \u984C</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width: ' + progPct + '%"></div></div>';
  html += '<div class="q-card">';
  html += '<div class="q-stem">' + escapeHtml(q.stem).replace(/\n/g, '<br>') + '</div>';
  if (q.fig) html += q.fig;
  html += '<div id="opts">' + optsHtml + '</div>';
  html += '<div id="explain-area"></div>';
  html += '<div id="btn-area"></div>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;

  document.getElementById('back-btn').addEventListener('click', function () {
    if (state.answered || confirm('\u96E2\u958B\u5C07\u5931\u53BB\u9019\u6B21\u7DF4\u7FD2\u9032\u5EA6\uFF0C\u78BA\u5B9A\u8981\u8FD4\u56DE\uFF1F')) {
      renderHome();
    }
  });

  document.querySelectorAll('#opts .opt').forEach(function (btn) {
    btn.addEventListener('click', function () {
      if (state.answered) return;
      onAnswer(parseInt(btn.dataset.idx));
    });
  });
}

function onAnswer(chosen) {
  const q = state.queue[state.idx];
  const correct = chosen === q.ans;
  state.answered = true;

  const id = qid(q);
  const wasAnswered = !!progress.history[id];
  const prevCorrect = progress.history[id] === 'correct';
  progress.history[id] = correct ? 'correct' : 'wrong';
  if (!wasAnswered) {
    progress.totalAnswered++;
    if (correct) progress.totalCorrect++;
  } else {
    if (correct && !prevCorrect) progress.totalCorrect++;
    if (!correct && prevCorrect) progress.totalCorrect--;
  }
  if (correct) {
    progress.wrongIds = progress.wrongIds.filter(function (x) { return x !== id; });
  } else {
    if (progress.wrongIds.indexOf(id) === -1) progress.wrongIds.push(id);
  }
  saveProgress();

  document.querySelectorAll('#opts .opt').forEach(function (btn, i) {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  let expHtml = '<div class="explain">';
  expHtml += '<b>' + (correct ? '\u2713 \u7B54\u5C0D\u4E86' : '\u2717 \u7B54\u932F\u4E86') + ' \u00B7 \u6B63\u78BA\u7B54\u6848\uFF1A' + LETTERS[q.ans] + '</b>';
  expHtml += escapeHtml(q.exp).replace(/\n/g, '<br>');
  expHtml += '</div>';
  document.getElementById('explain-area').innerHTML = expHtml;

  const isLast = state.idx === state.queue.length - 1;
  document.getElementById('btn-area').innerHTML = '<button id="next-btn" class="btn-primary">' + (isLast ? '\u5B8C\u6210' : '\u4E0B\u4E00\u984C \u2192') + '</button>';
  document.getElementById('next-btn').addEventListener('click', function () {
    if (isLast) renderComplete();
    else {
      state.idx++;
      state.answered = false;
      renderQuestion();
      window.scrollTo(0, 0);
    }
  });
}

function renderComplete() {
  const total = state.queue.length;
  const correctCount = state.queue.filter(function (q) { return progress.history[qid(q)] === 'correct'; }).length;
  const acc = Math.round(correctCount / total * 100);

  let html = '<div class="complete">';
  html += '<div class="complete-title">\uD83C\uDF89 \u5B8C\u6210\u9019\u8F2A\u7DF4\u7FD2\uFF01</div>';
  html += '<div class="stat-grid" style="max-width: 320px; margin: 0 auto 20px;">';
  html += '<div class="stat-card"><div class="stat-label">\u7E3D\u984C\u6578</div><div class="stat-num">' + total + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u7B54\u5C0D</div><div class="stat-num">' + correctCount + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u6B63\u78BA\u7387</div><div class="stat-num">' + acc + '%</div></div>';
  html += '<div class="stat-card"><div class="stat-label">\u7B54\u932F</div><div class="stat-num">' + (total - correctCount) + '</div></div>';
  html += '</div>';
  html += '<button id="home-btn" class="btn-primary">\u56DE\u5230\u9996\u9801</button>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('home-btn').addEventListener('click', renderHome);
}

renderHome();
</script>
